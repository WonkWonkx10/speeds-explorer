const expand = (word) => {
  const w = word.toLowerCase();
  const syn = SYNONYMS[w];
  return syn ? [w, syn] : [w];
};

const expandPhrase = (input) => {
  let extra = [];
  for (const [pattern, terms] of PHRASE_MAP) {
    if (pattern.test(input)) extra.push(...terms);
  }
  return extra;
};

const fuzzy = (input, keywords) => {
  const s = input.toLowerCase().trim();
  if (s.length < 3) return false;
  const sWords = s.split(/\s+/);
  // Expand input words with synonyms
  const expanded = sWords.flatMap(expand);
  // Also expand full phrase to geographic terms
  const phraseTerms = expandPhrase(s);
  const allTerms = [...expanded, ...phraseTerms];
  // Simple edit distance for typo tolerance
  const typoMatch = (a, b) => {
    if (Math.abs(a.length - b.length) > 2) return false;
    if (a.length < 6 || b.length < 6) return false;
    let d = 0, i = 0, j = 0;
    while (i < a.length && j < b.length) {
      if (a[i] !== b[j]) {
        d++;
        if (d > 2) return false;
        if (a.length > b.length) i++;
        else if (b.length > a.length) j++;
        else { i++; j++; }
      } else { i++; j++; }
    }
    return (d + (a.length - i) + (b.length - j)) <= 2;
  };
  return keywords.some(k => {
    const kl = k.toLowerCase();
    const kWords = kl.split(/\s+/);
    // Exact full-phrase match
    if (s === kl) return true;
    // Check if any phrase-mapped term matches this keyword
    if (phraseTerms.some(pt => {
      const ptl = pt.toLowerCase();
      if (kl === ptl || kl.includes(ptl) || ptl.includes(kl)) return true;
      const ptWords = ptl.split(/\s+/);
      return ptWords.length > 1 && ptWords.every(pw => kWords.some(kw => kw.startsWith(pw) || pw.startsWith(kw)));
    })) return true;
    // Single-word input
    if (sWords.length === 1) {
      const tries = expand(s);
      for (const tryW of tries) {
        if (kWords.length === 1) {
          if (kl === tryW || typoMatch(kl, tryW) || (tryW.length >= 7 && (kl.startsWith(tryW) || tryW.startsWith(kl)))) return true;
        } else {
          if (kWords.some(w => w === tryW || typoMatch(w, tryW) || (tryW.length >= 7 && w.length >= 5 && (w.startsWith(tryW) || tryW.startsWith(w))))) return true;
        }
      }
      return false;
    }
    // Multi-word input: 2+ meaningful word overlaps (using all expanded terms)
    const hits = allTerms.filter(a => a.length >= 4 && kWords.some(b => b.length >= 4 && (b === a || typoMatch(a, b) || b.startsWith(a) || a.startsWith(b))));
    if (hits.length >= 2) return true;
    // Full phrase substring: only if input is contained in a longer keyword (student typed a subset of the full term)
    if (s.length >= 10 && kl.length >= s.length && kl.includes(s)) return true;
    return false;
  });
};

// =============================================================================
// CHANGE 1: CED vocabulary layer
// Before fuzzyMatch runs, check if the student's input matches a CED term or
// common_phrasing. If yes:
//   (a) if the location already has an observation whose keywords reference the
//       CED term, credit that observation at full Tier 1 value;
//   (b) else if the term is photo_observable AND the term's CED unit aligns with
//       the location's unitAlignment, give full credit and push a synthetic
//       "CED term" observation using the CED definition as the display text.
// =============================================================================

// Normalize for text comparison: lowercase, strip punctuation except hyphens-in-word
const normCed = s => (s || "")
  .toLowerCase()
  .trim()
  .replace(/[^\w\s-]/g, ' ')
  .replace(/\s+/g, ' ')
  .trim();

// Build lookup from normalized term/phrasing → vocab entry.
// Skip very short keys (< 4 chars) to avoid noise.
const CED_LOOKUP = (() => {
  const m = new Map();
  for (const e of CED_VOCAB) {
    const nt = normCed(e.t);
    if (nt.length >= 4) m.set(nt, e);
    for (const p of (e.p || [])) {
      const np = normCed(p);
      if (np.length >= 4 && !m.has(np)) m.set(np, e);
    }
  }
  return m;
})();

// Try to match the input to a CED vocab entry. Returns the entry, or null.
const findCedEntry = (input) => {
  const ni = normCed(input);
  if (ni.length < 4) return null;
  // Exact hit first — always OK
  if (CED_LOOKUP.has(ni)) return CED_LOOKUP.get(ni);
  // Substring pass — STRICT: reject if the input is a generic word or is
  // short enough to be a substring of many unrelated vocab phrasings.
  // Without this, "buildings" matches "postmodern architecture" (via the
  // phrasing "postmodern buildings") and "roads" matches half the vocab.
  if (GENERIC_WORDS && GENERIC_WORDS.has(ni)) return null;
  if (ni.length < 8) return null;
  // Long, non-generic input: allow substring match in either direction.
  let best = null, bestLen = 0;
  for (const [key, val] of CED_LOOKUP.entries()) {
    if (key.length < 6) continue;
    if (ni === key || ni.includes(key) || key.includes(ni)) {
      // Prefer the longest matching key (most specific)
      if (key.length > bestLen) { best = val; bestLen = key.length; }
    }
  }
  return best;
};

// Given a CED entry and a location, try to find a matching existing observation
// in the location. Returns {obs, category, tier} or null.
const findRelatedObs = (entry, loc) => {
  if (!loc || !loc.observations) return null;
  const termLower = normCed(entry.t);
  const phrasingsN = (entry.p || []).map(normCed).filter(p => p.length >= 4);
  const needles = [termLower, ...phrasingsN];

  for (const sp of SPEEDS) {
    const c = loc.observations[sp.key] || {};
    const tiers = [[c.tier1 || [], 1], [c.tier2 || [], 2]];
    for (const [list, tierNum] of tiers) {
      for (const o of list) {
        const kwJoined = (o.keywords || []).map(normCed).join(' ');
        const displayN = normCed(o.display || "");
        const haystack = kwJoined + ' ' + displayN;
        for (const needle of needles) {
          if (needle && haystack.includes(needle)) {
            return { obs: o, category: sp.key, tier: tierNum };
          }
        }
      }
    }
  }
  return null;
};

// Unit alignment: location.unitAlignment entries look like "6.10", "3.2", etc.
// Compare the integer part of each entry against the CED term's ced_unit list.
const unitsAlign = (entry, loc) => {
  if (!entry.u || entry.u.length === 0) return false;
  if (!loc.unitAlignment || loc.unitAlignment.length === 0) return false;
  const locUnits = new Set(
    loc.unitAlignment
      .map(s => parseInt(String(s).split('.')[0], 10))
      .filter(n => !isNaN(n))
  );
  return entry.u.some(u => locUnits.has(u));
};

// Top-level CED matcher. Returns one of:
//   null                                    — no CED match
//   {kind:'relatedObs', obs, category, tier, entry}  — credit local obs at full T1 value
//   {kind:'synthetic',  obs, category, tier, entry}  — credit synthetic CED obs
// The caller is responsible for dedup against matched[] and for awarding points.
const cedMatch = (input, loc) => {
  const entry = findCedEntry(input);
  if (!entry) return null;

  // Prefer linking to an existing observation on this location
  const related = findRelatedObs(entry, loc);
  if (related) {
    return {
      kind: 'relatedObs',
      obs: { ...related.obs, text: related.obs.display || related.obs.text || "" },
      category: related.category,
      tier: 1, // brief: credit at full Tier 1 value
      entry
    };
  }

  // No related obs → only credit if photo-observable AND unit-aligned
  if (!entry.o) return null;
  if (!unitsAlign(entry, loc)) return null;

  const cat = (entry.c && entry.c[0]) || 'spatial';
  const displayText = entry.d
    ? `${entry.t} — ${entry.d}`
    : entry.t;
  return {
    kind: 'synthetic',
    obs: {
      keywords: [entry.t, ...(entry.p || [])],
      display: displayText,
      text: displayText,
    },
    category: cat,
    tier: 1,
    entry
  };
};

// =============================================================================
// CHANGE 3 HELPER: wordsRelated
// Replaces typoMatch+startsWith in the multi-word match path. A word-pair only
// counts as related if one is a substring of the other, or if they share a 5+
// character prefix. Stops phonetic collisions like "paved" ≠ "painted".
// =============================================================================
const wordsRelated = (a, b) => {
  if (!a || !b) return false;
  if (a === b) return true;
  // Substring (preserves "road"→"roadway", "paved"→"pavement", "building"→"buildings")
  if (a.includes(b) || b.includes(a)) return true;
  // Shared 5+ char prefix
  const min = Math.min(a.length, b.length);
  let shared = 0;
  for (let i = 0; i < min; i++) {
    if (a[i] === b[i]) shared++;
    else break;
  }
  return shared >= 5;
};

const fuzzyMatch = (input, keywords) => {
  const s = input.toLowerCase().trim();
  if (s.length < 3) return {matched: false};
  const sWords = s.split(/\s+/);
  const expanded = sWords.flatMap(expand);
  const phraseTerms = expandPhrase(s);
  const allTerms = [...expanded, ...phraseTerms];
  const typoMatch = (a, b) => {
    if (Math.abs(a.length - b.length) > 2) return false;
    if (a.length < 6 || b.length < 6) return false;
    let d = 0, i = 0, j = 0;
    while (i < a.length && j < b.length) {
      if (a[i] !== b[j]) {
        d++;
        if (d > 2) return false;
        if (a.length > b.length) i++;
        else if (b.length > a.length) j++;
        else { i++; j++; }
      } else { i++; j++; }
    }
    return (d + (a.length - i) + (b.length - j)) <= 2;
  };
  // Single-word generic input: every match against a multi-word keyword is LOOSE.
  // Single-word generic input matching a single-word keyword is also loose
  // (e.g. typing "trees" when the keyword is just "trees" — they identified the
  //  category of thing but not what was distinctive about it in this image).
  const inputIsGeneric = sWords.length === 1 && GENERIC_WORDS.has(sWords[0]);
  // Track best match found across all keywords for this entry
  let best = null;
  for (const k of keywords) {
    const kl = k.toLowerCase();
    const kWords = kl.split(/\s+/);
    // Exact full-phrase match -> SPECIFIC (unless input is a single generic word)
    if (s === kl) {
      if (inputIsGeneric) { best = best || {matched: true, quality: 'loose'}; continue; }
      return {matched: true, quality: 'specific'};
    }
    // Phrase-map term match -> SPECIFIC (student used geographic vocabulary)
    if (phraseTerms.some(pt => {
      const ptl = pt.toLowerCase();
      if (kl === ptl || kl.includes(ptl) || ptl.includes(kl)) return true;
      const ptWords = ptl.split(/\s+/);
      return ptWords.length > 1 && ptWords.every(pw => kWords.some(kw => kw.startsWith(pw) || pw.startsWith(kw)));
    })) return {matched: true, quality: 'specific'};
    // Single-word input
    if (sWords.length === 1) {
      const tries = expand(s);
      for (const tryW of tries) {
        if (kWords.length === 1) {
          if (kl === tryW || typoMatch(kl, tryW) || (tryW.length >= 7 && (kl.startsWith(tryW) || tryW.startsWith(kl)))) {
            if (inputIsGeneric) { best = best || {matched: true, quality: 'loose'}; }
            else return {matched: true, quality: 'specific'};
          }
        } else {
          // Single word matching multi-word keyword:
          //   - if input is generic -> LOOSE
          //   - if input matches the keyword's HEAD NOUN -> SPECIFIC
          //   - otherwise (matches a modifier or side-detail) -> LOOSE
          //
          // Identifying the head noun: usually the last word, but if the keyword
          // ends with a prepositional or descriptive tail ("on horizon",
          // "in distance", "of buildings"), walk backward through positional/filler
          // words to find the real head.
          const POSITIONAL = new Set([
            "on","in","at","by","near","over","under","along","around","behind","between","beside",
            "with","without","of","for","from","to","into","onto",
            "the","a","an","and","or","but","that","which",
            "horizon","background","frame","distance","front","side","top","bottom","middle","center","centre","sky",
            "style","pattern","type","kind","form","look","appearance",
            "visible","seen","shown","showing","painted","made","based","dominated","dominant",
            "above","below","there","here","everywhere","throughout"
          ]);
          let headIdx = kWords.length - 1;
          while (headIdx > 0 && POSITIONAL.has(kWords[headIdx])) headIdx--;
          const headNoun = kWords[headIdx];
          const matchedWord = kWords.find(w =>
            w === tryW ||
            typoMatch(w, tryW) ||
            (tryW.length >= 7 && w.length >= 5 && (w.startsWith(tryW) || tryW.startsWith(w)))
          );
          if (matchedWord) {
            if (inputIsGeneric) {
              best = best || {matched: true, quality: 'loose'};
            } else if (matchedWord === headNoun ||
                       (matchedWord.length >= 5 && headNoun.length >= 5 &&
                        (matchedWord.startsWith(headNoun) || headNoun.startsWith(matchedWord)))) {
              return {matched: true, quality: 'specific'};
            } else {
              best = best || {matched: true, quality: 'loose'};
            }
          }

    // Critical: count UNIQUE keyword-words matched, not raw hits — otherwise
    // two different expanded input terms can both map to the same keyword word
    // (e.g. "people" -> "pedestrians" AND phrase-map "lots of people" -> "pedestrian density"
    //  both match the keyword word "pedestrian", but that's really one concept matching once).
    //
    // CHANGE 3 (paved/painted fix): use wordsRelated instead of typoMatch+startsWith.
    // Only count a pair if one is a substring of the other, or they share a 5+ char
    // prefix. "paved" ≠ "painted" (shared prefix "pa" = 2 chars, neither a substring).
    const matchedKwords = new Set();
    for (const a of allTerms) {
      if (a.length < 4) continue;
      for (const b of kWords) {
        if (b.length < 4) continue;
        if (wordsRelated(a, b)) {
          matchedKwords.add(b);
        }
      }
    }
    if (matchedKwords.size >= 2) return {matched: true, quality: 'specific'};
    // Full phrase substring: SPECIFIC (student typed a substantial subset of the full term)
    if (s.length >= 10 && kl.length >= s.length && kl.includes(s)) return {matched: true, quality: 'specific'};
  }
  return best || {matched: false};
};

const haversine = (la1,lo1,la2,lo2) => {
  const R=6371, dr=Math.PI/180;
  const dLa=(la2-la1)*dr, dLo=(lo2-lo1)*dr;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*dr)*Math.cos(la2*dr)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

const locPts = d => d<150?5000:d<500?4000:d<1000?3000:d<2000?2000:d<4000?1000:d<8000?500:100;

// ——— WorldMap ———
// Robinson projection (d3-geo-projection) with an earth palette.
// paper  #F1ECDE   background
// sienna #A07548   accents (drop-pin, dashed line)
// ink    #1A2130   bullseye ring, text
// land   #E4D9BC   fill; border stroke is a slightly darker sienna #8F6A3F
//
// Props:
//   onClick(lat, lng)   fires on Locate clicks; snapped to country centroid
//   guess  {lat,lng}    user's guess; rendered as a drop-pin
//   actual {lat,lng}    true location; rendered as a bullseye in reveal mode
//   showActual          boolean; render the actual pin + dashed line + distance badge
//   distanceKm          optional number; when present in reveal, shown as a badge
//   revealMode          when true, the map auto-zooms to fit both pins and disables panning UI
const WorldMap = ({ onClick, guess, actual, showActual, distanceKm, revealMode }) => {
  const svgRef = useRef(null);
  const [geoData, setGeoData] = useState(null);
  const [countries, setCountries] = useState(null);
  const [xform, setXform] = useState({k:1,x:0,y:0});
  const zoomBeh = useRef(null);
  const W = 580, H = 290;

  // Earth palette
  const COLORS = {
    paper:      "#F1ECDE",
    land:       "#E4D9BC",
    landStroke: "#8F6A3F",
    graticule:  "#C9B997",
    equator:    "#A07548",
    sienna:     "#A07548",
    siennaDeep: "#6B4A2D",
    ink:        "#1A2130",
    guess:      "#A07548",
    actualRing: "#1A2130",
    actualDot:  "#A07548"
  };

  const proj = useMemo(() => {
    if (typeof d3 === "undefined") return null;
    const robinson = (d3.geoRobinson || d3.geoNaturalEarth1);
    return robinson().scale(108).translate([W/2, H/2]).precision(0.1);
  }, []);

  const pathGen = useMemo(() => {
    if (!proj) return null;
    return d3.geoPath().projection(proj);
  }, [proj]);

  useEffect(() => {
    if (!pathGen) return;
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(r => r.json())
      .then(world => {
        const land = topojson.feature(world, world.objects.land);
        const countryFc = topojson.feature(world, world.objects.countries);
        const borders = topojson.mesh(world, world.objects.countries, (a,b) => a !== b);
        setGeoData({ landPath: pathGen(land), bordersPath: pathGen(borders) });
        setCountries(countryFc);
      })
      .catch(() => setGeoData({ error: true }));
  }, [pathGen]);

  useEffect(() => {
    if (!svgRef.current) return;
    const zoom = d3.zoom()
      .scaleExtent([1, 12])
      .filter(e => {
        if (revealMode) return false;
        return e.type === "mousedown" || e.type === "touchstart" || (e.type === "wheel" && e.ctrlKey);
      })
      .on("zoom", e => setXform({k:e.transform.k, x:e.transform.x, y:e.transform.y}));
    d3.select(svgRef.current).call(zoom);
    zoomBeh.current = zoom;
  }, [svgRef.current, revealMode]);

  // Auto-zoom to fit both pins on reveal
  useEffect(() => {
    if (!revealMode || !guess || !actual || !proj || !svgRef.current || !zoomBeh.current) return;
    const g = proj([guess.lng, guess.lat]);
    const a = proj([actual.lng, actual.lat]);
    if (!g || !a || [g[0],g[1],a[0],a[1]].some(v => !Number.isFinite(v))) return;
    const minX = Math.min(g[0], a[0]), maxX = Math.max(g[0], a[0]);
    const minY = Math.min(g[1], a[1]), maxY = Math.max(g[1], a[1]);
    const padX = 70, padY = 55;
    const dx = (maxX - minX) + padX*2;
    const dy = (maxY - minY) + padY*2;
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const k = Math.max(1, Math.min(6, Math.min(W/dx, H/dy)));
    const tx = W/2 - cx*k;
    const ty = H/2 - cy*k;
    // defer one frame to make sure the svg has laid out
    const rafId = requestAnimationFrame(() => {
      if (!svgRef.current || !zoomBeh.current) return;
      d3.select(svgRef.current).transition().duration(700)
        .call(zoomBeh.current.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
    });
    return () => cancelAnimationFrame(rafId);
  }, [revealMode, proj, guess && guess.lat, guess && guess.lng, actual && actual.lat, actual && actual.lng]);

  const resetZoom = e => {
    e.stopPropagation();
    if (svgRef.current && zoomBeh.current)
      d3.select(svgRef.current).transition().duration(400).call(zoomBeh.current.transform, d3.zoomIdentity);
  };

  const zoomIn = e => {
    e.stopPropagation();
    if (svgRef.current && zoomBeh.current)
      d3.select(svgRef.current).transition().duration(250).call(zoomBeh.current.scaleBy, 1.6);
  };

  const zoomOut = e => {
    e.stopPropagation();
    if (svgRef.current && zoomBeh.current)
      d3.select(svgRef.current).transition().duration(250).call(zoomBeh.current.scaleBy, 0.625);
  };

  // Snap the click to the centroid of the country under the pointer.
  // Falls back to the raw click point if no country feature contains it.
  const handleClick = e => {
    if (revealMode) return;
    if (!proj || !svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const svgX = ((e.clientX - rect.left) / rect.width * W - xform.x) / xform.k;
    const svgY = ((e.clientY - rect.top) / rect.height * H - xform.y) / xform.k;
    const coords = proj.invert([svgX, svgY]);
    if (!coords || isNaN(coords[0]) || isNaN(coords[1])) return;
    const lng = coords[0], lat = coords[1];
    if (countries && countries.features && pathGen) {
      const hit = countries.features.find(f => d3.geoContains(f, [lng, lat]));
      if (hit) {
        const c = d3.geoCentroid(hit);
        if (c && Number.isFinite(c[0]) && Number.isFinite(c[1])) {
          onClick(c[1], c[0]);
          return;
        }
      }
    }
    onClick(lat, lng);
  };

  // Raw projection coords (inside the zoomed <g>). Pins live inside the same <g>
  // as the map and are counter-scaled by 1/k so they stay visually constant.
  const gProj = guess && proj ? proj([guess.lng, guess.lat]) : null;
  const aProj = (showActual && actual && proj) ? proj([actual.lng, actual.lat]) : null;
  const gOk = gProj && Number.isFinite(gProj[0]) && Number.isFinite(gProj[1]);
  const aOk = aProj && Number.isFinite(aProj[0]) && Number.isFinite(aProj[1]);

  const graticule = proj && pathGen ? pathGen(d3.geoGraticule()()) : null;
  const outline = proj && pathGen ? pathGen({type:"Sphere"}) : null;
  const equator = proj && pathGen ? pathGen({type:"LineString",coordinates:[[-180,0],[0,0],[180,0]]}) : null;

  const borderW = 0.5 / xform.k;
  const invK = 1 / (xform.k || 1); // counter-scale factor

  // Pin / bullseye sizes (constant screen pixels, thanks to invK counter-scale)
  const PIN_R    = 6;
  const BULLS_R1 = 9;
  const BULLS_R2 = 5.5;
  const BULLS_R3 = 2.5;

  const fmtKm = d => {
    if (!Number.isFinite(d)) return "";
    if (d < 10)    return d.toFixed(1) + " km";
    if (d < 1000)  return Math.round(d) + " km";
    return (d/1000).toFixed(1).replace(/\.0$/, "") + "k km";
  };

  return (
    <div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${COLORS.landStroke}`,background:COLORS.paper,position:"relative"}}>
      {!revealMode && <div style={{position:"absolute",top:8,right:8,zIndex:10,display:"flex",gap:4,alignItems:"center"}}>
        <button onClick={zoomIn}  style={{background:COLORS.paper,border:`1px solid ${COLORS.landStroke}`,borderRadius:4,width:30,height:30,fontSize:20,cursor:"pointer",fontWeight:500,color:COLORS.ink,lineHeight:1,fontFamily:"'Inter',sans-serif"}}>+</button>
        <button onClick={zoomOut} style={{background:COLORS.paper,border:`1px solid ${COLORS.landStroke}`,borderRadius:4,width:30,height:30,fontSize:20,cursor:"pointer",fontWeight:500,color:COLORS.ink,lineHeight:1,fontFamily:"'Inter',sans-serif"}}>−</button>
        {xform.k > 1 && <button onClick={resetZoom} style={{background:COLORS.paper,border:`1px solid ${COLORS.landStroke}`,borderRadius:4,padding:"3px 8px",fontSize:13,cursor:"pointer",fontWeight:500,color:COLORS.ink,fontFamily:"'Inter',sans-serif"}}>reset</button>}
      </div>}
      {!revealMode && <div style={{position:"absolute",bottom:8,left:8,zIndex:10,background:"rgba(241,236,222,0.85)",borderRadius:3,padding:"2px 8px",fontSize:11,color:COLORS.siennaDeep,pointerEvents:"none",fontFamily:"'Inter',sans-serif",letterSpacing:0.3}}>
        {xform.k > 1 ? `${xform.k.toFixed(1)}× · drag to pan` : "click a country to drop your pin"}
      </div>}
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",cursor:revealMode ? "default" : (xform.k>1?"move":"crosshair"),background:COLORS.paper}} onClick={handleClick}>
        <rect width={W} height={H} fill={COLORS.paper}/>
        <g transform={`translate(${xform.x},${xform.y}) scale(${xform.k})`}>
          {graticule && <path d={graticule} fill="none" stroke={COLORS.graticule} strokeWidth={borderW*0.8} opacity={0.45}/>}
          {geoData && !geoData.error && <path d={geoData.landPath}    fill={COLORS.land} stroke={COLORS.landStroke} strokeWidth={borderW*1.4} opacity={1}/>}
          {geoData && !geoData.error && <path d={geoData.bordersPath} fill="none"        stroke={COLORS.landStroke} strokeWidth={borderW}     opacity={0.85}/>}
          {outline && <path d={outline} fill="none" stroke={COLORS.landStroke} strokeWidth={borderW*1.6} opacity={0.9}/>}
          {equator && <path d={equator} fill="none" stroke={COLORS.equator} strokeWidth={borderW*0.9} strokeDasharray={`${3/xform.k},${3/xform.k}`} opacity={0.35}/>}
          {geoData && geoData.error && <text x={W/2} y={H/2} fill={COLORS.siennaDeep} fontSize={12} textAnchor="middle" fontFamily="'Inter',sans-serif">Map unavailable offline</text>}
          {!geoData && <text x={W/2} y={H/2} fill={COLORS.siennaDeep} fontSize={12} textAnchor="middle" fontFamily="'Inter',sans-serif">Loading map...</text>}

          {/* Dashed line between guess and actual (reveal only). Inside the zoomed <g>
              at raw projection coords; non-scaling-stroke keeps the line weight constant. */}
          {gOk && aOk && <line x1={gProj[0]} y1={gProj[1]} x2={aProj[0]} y2={aProj[1]}
            stroke={COLORS.sienna} strokeWidth={1.5} strokeDasharray="4,3" opacity={0.9}
            vectorEffect="non-scaling-stroke"/>}

          {/* Guess pin — drop-pin at projection coords, counter-scaled to stay visually constant */}
          {gOk && <g transform={`translate(${gProj[0]},${gProj[1]}) scale(${invK})`}>
            <path d={`M 0 2 L -${PIN_R*0.7} -${PIN_R*1.3} A ${PIN_R} ${PIN_R} 0 1 1 ${PIN_R*0.7} -${PIN_R*1.3} Z`}
              fill={COLORS.guess} stroke={COLORS.paper} strokeWidth={1.5}/>
            <circle cx={0} cy={-PIN_R*1.1} r={PIN_R*0.35} fill={COLORS.paper}/>
          </g>}

          {/* Actual-location bullseye (reveal only). Same counter-scale pattern. */}
          {aOk && <g transform={`translate(${aProj[0]},${aProj[1]}) scale(${invK})`}>
            <circle cx={0} cy={0} r={BULLS_R1} fill="none" stroke={COLORS.actualRing} strokeWidth={1.2} opacity={0.5}/>
            <circle cx={0} cy={0} r={BULLS_R2} fill="none" stroke={COLORS.actualRing} strokeWidth={1.3}/>
            <circle cx={0} cy={0} r={BULLS_R3} fill={COLORS.actualDot} stroke={COLORS.actualRing} strokeWidth={0.8}/>
            <line x1={-BULLS_R1-2} y1={0} x2={-BULLS_R1+3} y2={0} stroke={COLORS.actualRing} strokeWidth={1}/>
            <line x1={ BULLS_R1-3} y1={0} x2={ BULLS_R1+2} y2={0} stroke={COLORS.actualRing} strokeWidth={1}/>
            <line x1={0} y1={-BULLS_R1-2} x2={0} y2={-BULLS_R1+3} stroke={COLORS.actualRing} strokeWidth={1}/>
            <line x1={0} y1={ BULLS_R1-3} x2={0} y2={ BULLS_R1+2} stroke={COLORS.actualRing} strokeWidth={1}/>
          </g>}

          {/* Distance badge (reveal only). At midpoint of the two pins, counter-scaled. */}
          {revealMode && gOk && aOk && Number.isFinite(distanceKm) && <g
            transform={`translate(${(gProj[0]+aProj[0])/2},${(gProj[1]+aProj[1])/2 - 14*invK}) scale(${invK})`}>
            <rect x={-30} y={-10} width={60} height={18} rx={9} ry={9} fill={COLORS.paper} stroke={COLORS.landStroke} strokeWidth={0.8}/>
            <text x={0} y={3} textAnchor="middle" fontSize={11} fontWeight={600} fontFamily="'Inter',sans-serif" fill={COLORS.ink}>{fmtKm(distanceKm)}</text>
          </g>}
        </g>
      </svg>
    </div>
  );
};

const Toast = ({ msg, show, type }) => (
  <div style={{
    position:"fixed",top:24,left:"50%",
    transform:`translateX(-50%) translateY(${show?0:-160}px)`,
    background:"#F1ECDE",
    color:"#1A2130",
    padding:"12px 18px 12px 12px",
    borderRadius:4,
    fontSize:14.5,
    fontWeight:400,
    fontFamily:"'Inter',-apple-system,'Segoe UI',sans-serif",
    letterSpacing:0.1,
    zIndex:1000,
    transition:"transform 0.4s cubic-bezier(.4,0,.2,1)",
    boxShadow:"0 6px 28px rgba(26, 33, 48, 0.22)",
    display:"flex",alignItems:"center",gap:14,
    border:"0.5px solid rgba(26, 33, 48, 0.15)",
    borderLeft:`3px solid ${type==="wrong" ? "#A07548" : "#1A2130"}`,
    maxWidth:440
  }}>
    <img
      src={type==="wrong" ? "wrong.png" : "correct.png"}
      alt=""
      style={{width:64,height:64,objectFit:"contain",flexShrink:0,display:"block"}}
    />
    <span style={{lineHeight:1.4}}>{msg}</span>
  </div>
);

function SPEEDSExplorer() {
  useEffect(()=>{
    const l=document.createElement('link');
    l.href='https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap';
    l.rel='stylesheet';document.head.appendChild(l);
  },[]);

  const [phase,setPhase]=useState("start");
  const [howToPlay,setHowToPlay]=useState(false);
  const [roundIdx,setRoundIdx]=useState(0);
  const [order,setOrder]=useState([]);
  const [timer,setTimer]=useState(180);
  const [cat,setCat]=useState(null);
  const [inp,setInp]=useState("");
  const [matched,setMatched]=useState([]);
  const [streak,setStreak]=useState(0);
  const [obs$,setObs$]=useState(0);
  const [pin,setPin]=useState(null);
  const [loc$,setLoc$]=useState(0);
  const [dist,setDist]=useState(null);
  const [hints,setHints]=useState(false);
  const [frqTxt,setFrqTxt]=useState("");
  const [frqDone,setFrqDone]=useState(false);
  const [frqFB,setFrqFB]=useState(null);
  const [limTxt,setLimTxt]=useState("");
  const [limDone,setLimDone]=useState(false);
  const [limOk,setLimOk]=useState(false);
  const [toast,setToast]=useState("");
  const [toastOn,setToastOn]=useState(false);
  const [toastType,setToastType]=useState("correct");
  const [imgLoaded,setImgLoaded]=useState(false);
  const [scores,setScores]=useState([]);
  const [chunk,setChunk]=useState(0);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState({x:0,y:0});
  const [showAllObs,setShowAllObs]=useState(false);
  const iRef=useRef(null);
  const subRef=useRef(null);

  // Only pick locations that have images
  const playable = useMemo(()=>LOCATIONS.map((l,i)=>({...l,idx:i})).filter(l=>l.playable),[]);
  const ROUNDS = Math.min(playable.length, 3);
  const loc = order.length>0 && order[roundIdx]!==undefined ? LOCATIONS[order[roundIdx]] : null;

  const flash = useCallback((m, type)=>{
    setToast(m||RHINO[Math.floor(Math.random()*RHINO.length)]);
    setToastType(type||"correct");
    setToastOn(true);
    setTimeout(()=>setToastOn(false),2500);
  },[]);

  const start = () => {
    const picks = playable.sort(()=>Math.random()-0.5).slice(0,ROUNDS).map(l=>l.idx);
    setOrder(picks);setRoundIdx(0);setScores([]);reset();setPhase("observe");
  };
  const reset = () => {
    setTimer(180);setCat(null);setInp("");setMatched([]);setStreak(0);setObs$(0);
    setPin(null);setLoc$(0);setDist(null);setHints(false);setFrqTxt("");setFrqDone(false);
    setFrqFB(null);setLimTxt("");setLimDone(false);setLimOk(false);setChunk(0);
    setZoom(1);setPan({x:0,y:0});setShowAllObs(false);
  };

  // Keep submit ref fresh
  useEffect(()=>{subRef.current=()=>{
    if(!loc)return;
    const lat=loc.coordinates?.lat ?? loc.lat, lng=loc.coordinates?.lng ?? loc.lng;
    const d=pin?haversine(pin.lat,pin.lng,lat,lng):20000;
    setDist(Math.round(d));setLoc$(locPts(d));setPhase("reveal");
  };});

  useEffect(()=>{
    if(phase!=="observe")return;
    const t=setInterval(()=>setTimer(p=>{if(p<=1){setPhase("locate");setTimer(30);return 30;}return p-1;}),1000);
    return()=>clearInterval(t);
  },[phase]);

  useEffect(()=>{
    if(phase!=="locate")return;
    const t=setInterval(()=>setTimer(p=>{if(p<=1){subRef.current?.();return 0;}return p-1;}),1000);
    return()=>clearInterval(t);
  },[phase]);

  useEffect(()=>{setImgLoaded(false);setZoom(1);setPan({x:0,y:0});},[roundIdx]);

  const allObs = useMemo(()=>{
    if(!loc)return [];
    const r=[];
    SPEEDS.forEach(s=>{
      const c=loc.observations[s.key]||{};
      (c.tier1||[]).forEach(o=>r.push({...o,text:o.display||o.text||"",category:s.key,tier:1}));
      (c.tier2||[]).forEach(o=>r.push({...o,text:o.display||o.text||"",category:s.key,tier:2}));
    });
    return r;
  },[loc]);

  const submitObs = () => {
    if(!inp.trim()||!loc)return;
    // Helper: try to match `o` against the input, returning {matched, quality} or null
    const tryMatch = o => {
      const r = fuzzyMatch(inp, o.keywords);
      return r.matched ? r : null;
    };
    // Small helper: show a clarification-style toast (kitten voice, flippant)
    const flashClarify = () => {
      const q = pickClarification(inp)
        || GENERIC_FALLBACK_CLARIFY[Math.floor(Math.random()*GENERIC_FALLBACK_CLARIFY.length)];
      flash(q, "wrong");
    };
    // Dedup helper for matched[]
    const alreadyMatched = (key) => matched.some(m => (m.text || m.display) === key);

    // ========================================================================
    // CHANGE 1: CED vocabulary layer runs first.
    // If the input matches a CED term (e.g. "bid-rent theory", "squatter
    // settlement", "gentrification"), we either link it to an existing
    // observation on this location, or award a synthetic "CED term"
    // observation if the term is photo_observable AND unit-appropriate.
    // Either way: full Tier 1 value, chill rhino toast, no loose-match flag.
    // ========================================================================
    const cedHit = cedMatch(inp, loc);
    if (cedHit) {
      const text = cedHit.obs.text || cedHit.obs.display || cedHit.entry.t;
      if (!alreadyMatched(text)) {
        // If a category pill is selected and it disagrees with the CED hit's
        // category, redirect the student to the right pill instead of
        // silently crediting the wrong SPEEDS column.
        if (cat && cat !== cedHit.category) {
          const sp = SPEEDS.find(s => s.key === cedHit.category);
          setStreak(0);
          flash(`Close — "${cedHit.entry.t}" is a ${sp.label} thing. Try the ${sp.icon} ${sp.label} pill.`, "wrong");
          setInp(""); iRef.current?.focus();
          return;
        }
        const s3 = streak+1 >= 3;
        const pts = s3 ? 15 : 10; // full Tier 1 value
        const newEntry = {
          ...cedHit.obs,
          text,
          display: cedHit.obs.display || text,
          category: cedHit.category,
          tier: 1,
          pts,
          ced: true
        };
        setMatched(p => [...p, newEntry]);
        setStreak(p => p + 1);
        setObs$(p => p + pts);
        flash(); // RHINO default
        setInp(""); iRef.current?.focus();
        return;
      }
      // If the CED-linked obs was already matched, fall through to the
      // normal matcher so we don't silently swallow the input.
    }

    // ========================================================================
    // Normal matcher: find best observation match within / across categories.
    // ========================================================================
    if(cat){
      // Find a not-yet-matched observation in the chosen category
      let found=null, foundResult=null;
      for(const o of allObs){
        if(matched.some(m=>m.text===o.text)) continue;
        if(o.category!==cat) continue;
        const r=tryMatch(o);
        if(r){found=o; foundResult=r; break;}
      }
      if(found){
        if(foundResult.quality==='loose'){
          // CHANGE 2: 0 pts, NOT added to matched[], streak unchanged,
          // targeted clarification question instead of chill-kitten toast.
          flashClarify();
        } else {
          const s3=streak+1>=3;
          const pts=(found.tier===1?(s3?15:10):(s3?8:5))+(found.geoVocab?2:0);
          setMatched(p=>[...p,{...found,pts}]);
          setStreak(p=>p+1);
          setObs$(p=>p+pts);
          flash();
        }
      } else {
        // No match in chosen category — check other categories
        // Only redirect if the cross-category match is SPECIFIC.
        // If the cross-category match is also loose, the input was too
        // generic, not wrong-pill. Route to clarification.
        let wrongCat=null, wrongResult=null;
        for(const o of allObs){
          if(matched.some(m=>m.text===o.text)) continue;
          if(o.category===cat) continue;
          const r=tryMatch(o);
          if(r){wrongCat=o; wrongResult=r; break;}
        }
        if(wrongCat && wrongResult.quality==='specific'){
          const sp=SPEEDS.find(s=>s.key===wrongCat.category);
          setStreak(0);
          flash(`Close — that's a ${sp.label} thing. Try the ${sp.icon} ${sp.label} pill.`,"wrong");
        } else if(wrongCat && wrongResult.quality==='loose'){
          // CHANGE 2: generic input that vaguely matched somewhere → clarification
          flashClarify();
        } else if (pickClarification(inp)) {
          // CHANGE 2: no match anywhere, but input has a clarification — use it
          // (e.g. "paved roads" on a location with no road-related keywords)
          flashClarify();
        } else {
          setStreak(0);
          flash(WRONG[Math.floor(Math.random()*WRONG.length)],"wrong");
        }
      }
    } else {
      // No category selected — match against all
      let found=null, foundResult=null;
      for(const o of allObs){
        if(matched.some(m=>m.text===o.text)) continue;
        const r=tryMatch(o);
        if(r){found=o; foundResult=r; break;}
      }
      if(found){
        if(foundResult.quality==='loose'){
          // CHANGE 2: 0 pts, no matched[], no streak change, clarify
          flashClarify();
        } else {
          const s3=streak+1>=3;
          const pts=(found.tier===1?(s3?15:10):(s3?8:5))+(found.geoVocab?2:0);
          setMatched(p=>[...p,{...found,pts}]);
          setStreak(p=>p+1);
          setObs$(p=>p+pts);
          flash();
        }
      } else if (pickClarification(inp)) {
        // CHANGE 2: no match, but clarification available
        flashClarify();
      } else {
        setStreak(0);
        flash(WRONG[Math.floor(Math.random()*WRONG.length)],"wrong");
      }
    }

  };

  };

  const scoreFRQ = () => {
    if(!loc||!frqTxt.trim())return;
    const v=(loc.frq?.verb||"").toLowerCase(), t=frqTxt.toLowerCase();

    ck.stimulus=["image","photo","visible","shown","see","picture","shows","seen"].some(w=>t.includes(w));
    if(v==="explain") ck.verb=/because|due to|leads to|results in|causes|therefore|as a result|which means|since/.test(t);
    else if(v==="compare") ck.verb=/while|whereas|unlike|both|however|compared|in contrast|similar|different/.test(t);
    else if(v==="describe") ck.verb=t.split(/\s+/).length>=10;

          <p style={{margin:"0 0 18px"}}>I'm an AP<span style={{fontSize:8,verticalAlign:"super"}}>®</span> Research teacher at Carnegie Vanguard High School in Houston. A few months ago, getting ready for 211 student research presentations, I knew I'd need a project to work on while I listened. I also wanted to teach myself a little AI. So I went to my former co-teacher Dr. Charlotte Haney and asked what her AP<span style={{fontSize:8,verticalAlign:"super"}}>®</span> Human Geography students needed most before the exam.</p>

          <p style={{margin:"0 0 26px",fontFamily:"'Playfair Display',Georgia,serif",fontSize:17,fontStyle:"italic",color:"#6B4A2D"}}>So I jumped on it, and this is the result.</p>

            <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:28,fontWeight:500,margin:"0 0 14px",letterSpacing:-0.3,color:"#1A2130"}}>How to play</h2>
            <p style={{fontSize:14.5,lineHeight:1.65,color:"rgba(26, 33, 48, 0.8)",margin:"0 0 24px"}}>Each round takes about five minutes. You'll look at a real street-level photo, identify what's in it, drop a pin on a world map, and write a short FRQ-style answer.</p>

            <div style={{display:"flex",flexDirection:"column",gap:18,marginBottom:22}}>

                  <p style={{fontSize:13.5,lineHeight:1.6,color:"rgba(26, 33, 48, 0.75)",margin:0,marginBottom:8}}>This phase is about <strong style={{fontWeight:600}}>identifying</strong> &#8212; just naming the things you can actually see in the image. Not interpreting. Not explaining. Just naming.</p>

                  <p style={{fontSize:13.5,lineHeight:1.6,color:"rgba(26, 33, 48, 0.75)",margin:0}}>Write a short answer to an FRQ prompt about the image, then self-score with the ACE framework: did you <strong style={{fontWeight:600}}>Answer</strong> the prompt, <strong style={{fontWeight:600}}>Cite</strong> specific evidence, and <strong style={{fontWeight:600}}>Explain</strong> with geographic reasoning?</p>
                </div>
              </div>
            </div>

            <div style={{padding:"14px 16px",background:"rgba(200, 167, 93, 0.09)",borderLeft:"2px solid #A07548",borderRadius:"0 3px 3px 0",marginBottom:22}}>
              <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:"#6B4A2D",marginBottom:6}}>One tip</div>
              <p style={{fontSize:13,lineHeight:1.6,color:"rgba(26, 33, 48, 0.78)",margin:0}}>Identify what's visible, don't interpret what it means. "Hand-painted signs" during Observe &#8212; not "informal economy." Save the interpretation for the FRQ in step 3.</p>
            </div>

            <div style={{textAlign:"right"}}>
              <button onClick={()=>setHowToPlay(false)} style={{background:"#1A2130",color:"#F1ECDE",border:"none",padding:"12px 28px",fontSize:14,fontWeight:500,borderRadius:4,cursor:"pointer",fontFamily:"inherit"}}>Got it</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );

  // ——— SUMMARY ———
  if(phase==="summary") return (
    <div style={S.pg}>
      <div style={S.bx}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:56}}>🦏</div>
          <h1 style={S.h1}>Expedition Complete!</h1>
        </div>
        {scores.map((r,i)=>(
          <div key={i} style={{...S.cd,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:19}}>{r.name}</div>
              <div style={{fontSize:16,color:"#666"}}>Observations: {r.obs} + Coverage: {r.cov} + Location: {r.loc}</div>
            </div>
            <div style={{fontSize:26,fontWeight:900,color:"#2a9d8f"}}>{r.total}</div>
          </div>
        ))}
        <div style={{...S.cd,textAlign:"center"}}>
          <div style={{fontSize:52,fontWeight:900,color:"#e9c46a"}}>{grand}</div>
          <div style={{fontSize:17,color:"#666"}}>Total Score</div>
        </div>
        <div style={{textAlign:"center",marginTop:8}}>
          <button style={{...S.bt,...S.b1}} onClick={()=>{setPhase("start");setRoundIdx(0);setScores([]);}}>Play Again</button>
        </div>
      </div>
    </div>
  );

  if(!loc)return null;

  // ——— IMAGE VIEWER ———
  const handleTouchStart = (e)=>{if(zoom>1&&e.touches.length===1){setDragging(true);setDragStart({x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y});}};
  const handleTouchMove = (e)=>{if(dragging&&e.touches.length===1){e.preventDefault();setPan({x:e.touches[0].clientX-dragStart.x,y:e.touches[0].clientY-dragStart.y});}};
  const handleTouchEnd = ()=>setDragging(false);
  const Img = () => {
    const src = loc.image || null;
    if(!src) return <div style={{background:"linear-gradient(135deg,#e0dbd2,#d4cfc4)",borderRadius:12,height:240,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid #ccc5b8"}}><span style={{color:"#888",fontSize:19}}>Image not available</span></div>;
    const zBtn = {background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",borderRadius:8,width:36,height:36,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700};
    return (
      <div style={{borderRadius:12,overflow:"hidden",border:"2px solid #2a3a4a",position:"relative",cursor:zoom>1?"grab":"zoom-in",background:"#1a1a2e"}}
        onWheel={e=>{e.preventDefault();setZoom(z=>Math.max(1,Math.min(5,z+(e.deltaY<0?0.3:-0.3))));}}
        onMouseDown={e=>{if(zoom>1){setDragging(true);setDragStart({x:e.clientX-pan.x,y:e.clientY-pan.y});}}}
        onMouseMove={e=>{if(dragging)setPan({x:e.clientX-dragStart.x,y:e.clientY-dragStart.y});}}
        onMouseUp={()=>setDragging(false)}
        onMouseLeave={()=>setDragging(false)}
        onDoubleClick={()=>{if(zoom>1){setZoom(1);setPan({x:0,y:0});}else setZoom(2.5);}}
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleTouchEnd}
      >
        {!imgLoaded&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,color:"#aaa",fontSize:18}}>📷 Loading image...</div>}
        <img src={src} alt="Mystery location" onLoad={()=>setImgLoaded(true)} style={{width:"100%",height:"auto",display:imgLoaded?"block":"none",objectFit:"contain",transform:`scale(${zoom}) translate(${pan.x/zoom}px,${pan.y/zoom}px)`,transition:dragging?"none":"transform 0.2s",transformOrigin:"center"}} draggable={false}/>
        <div style={{position:"absolute",bottom:8,right:8,display:"flex",gap:6,zIndex:10}}>
          <button onClick={e=>{e.stopPropagation();setZoom(z=>Math.min(5,z+0.5));}} style={zBtn}>+</button>
          <button onClick={e=>{e.stopPropagation();setZoom(1);setPan({x:0,y:0});}} style={{...zBtn,fontSize:16}}>⟲</button>
          <button onClick={e=>{e.stopPropagation();setZoom(z=>Math.max(1,z-0.5));}} style={zBtn}>−</button>
        </div>
      </div>
    );
  };

  // ——— OBSERVE ———
  if(phase==="observe") return (
    <div style={{background:"#F1ECDE",minHeight:"100vh",fontFamily:"'Inter',-apple-system,'Segoe UI',sans-serif",color:"#1A2130",position:"relative"}}>
      <Toast msg={toast} show={toastOn} type={toastType}/>

      {/* Header strip */}
      <div style={{borderBottom:"0.5px solid rgba(26, 33, 48, 0.1)",background:"#F7F3E6"}}>
        <div style={{maxWidth:920,margin:"0 auto",padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:15,fontWeight:500,letterSpacing:0.3}}>SPEEDS Explorer</span>
            <span style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:"#6B4A2D"}}>Observe</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:18}}>
            <span style={{fontSize:12,color:"rgba(26, 33, 48, 0.55)"}}>Round {roundIdx+1} of {ROUNDS}</span>
            <span style={{fontSize:22,fontWeight:600,fontFamily:"'Inter',monospace",fontVariantNumeric:"tabular-nums",color:timer<30?"#A07548":"#1A2130",letterSpacing:0.5}}>{fmt(timer)}</span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:920,margin:"0 auto",padding:"24px"}}>

        {/* Image */}
        <div style={{marginBottom:20,borderRadius:6,overflow:"hidden",border:"0.5px solid rgba(26, 33, 48, 0.15)",background:"#1A2130"}}>
          <Img/>
        </div>

        {/* Instruction line */}
        <div style={{textAlign:"center",marginBottom:14,fontSize:13,color:"rgba(26, 33, 48, 0.6)",letterSpacing:0.1}}>
          Pick a category, then identify one specific thing you see.
        </div>

        {/* SPEEDS Pills */}
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10,justifyContent:"center",alignItems:"center"}}>
          {SPEEDS.map(sp=>{
            const n=matched.filter(m=>m.category===sp.key).length;
            const on=cat===sp.key;
            return <button key={sp.key} onClick={()=>setCat(on?null:sp.key)} style={{
              background:on?"#1A2130":"transparent",
              color:on?"#F1ECDE":"rgba(26, 33, 48, 0.75)",
              border:on?"1px solid #1A2130":"0.5px solid rgba(26, 33, 48, 0.25)",
              borderRadius:4,
              padding:"8px 14px",
              fontSize:13,
              fontWeight:on?600:500,
              cursor:"pointer",
              fontFamily:"inherit",
              display:"inline-flex",
              alignItems:"center",
              gap:7,
              transition:"all 0.15s",
              letterSpacing:0.2
            }}>
              <span style={{fontSize:14}}>{sp.icon}</span>
              {sp.label}
              {n>0&&<span style={{
                background:on?"rgba(241, 236, 222, 0.25)":"rgba(160, 117, 72, 0.15)",
                color:on?"#F1ECDE":"#6B4A2D",
                fontSize:11,fontWeight:600,padding:"1px 6px",borderRadius:8,marginLeft:2
              }}>{n}</span>}
            </button>;
          })}
          <button onClick={()=>setHints(!hints)} style={{
            background:hints?"#A07548":"transparent",
            color:hints?"#F1ECDE":"#A07548",
            border:hints?"1px solid #A07548":"0.5px solid rgba(160, 117, 72, 0.4)",
            borderRadius:4,padding:"8px 14px",fontSize:13,fontWeight:hints?600:500,
            cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",
            gap:6,transition:"all 0.15s",letterSpacing:0.2
          }}>
            Hints
          </button>
        </div>

        {/* Hint panel */}
        {hints&&<div style={{
          background:"rgba(160, 117, 72, 0.08)",
          borderLeft:"2px solid #A07548",
          borderRadius:"0 3px 3px 0",
          padding:"12px 16px",marginBottom:14,
          fontSize:13.5,lineHeight:1.55,color:"rgba(26, 33, 48, 0.78)"
        }}>
          <span style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:"#6B4A2D",marginRight:8}}>Hint</span>
          {cat?HINTS[cat]:"Pick a category above to see what to look for."}
        </div>}

        {/* Input + submit */}
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input ref={iRef} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitObs()}
            placeholder={cat?`Name one ${cat} thing you can see...`:"Pick a category first..."}
            disabled={!cat}
            style={{
              flex:1,padding:"14px 16px",borderRadius:4,
              border:"0.5px solid rgba(26, 33, 48, 0.25)",
              background:cat?"#FFFFFF":"rgba(255, 255, 255, 0.5)",
              color:"#1A2130",fontSize:15,outline:"none",
              fontFamily:"inherit",letterSpacing:0.1
            }}/>
          <button onClick={submitObs} disabled={!cat||!inp.trim()} style={{
            background:cat&&inp.trim()?"#1A2130":"rgba(26, 33, 48, 0.3)",
            color:"#F1ECDE",border:"none",padding:"14px 28px",
            fontSize:14,fontWeight:500,borderRadius:4,
            cursor:cat&&inp.trim()?"pointer":"not-allowed",
            fontFamily:"inherit",whiteSpace:"nowrap",letterSpacing:0.3
          }}>Submit</button>
        </div>

        {/* Score strip */}
        <div style={{
          display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"10px 16px",marginBottom:12,
          background:"#F7F3E6",borderRadius:4,
          border:"0.5px solid rgba(26, 33, 48, 0.08)"
        }}>
          <span style={{fontSize:12.5,color:"rgba(26, 33, 48, 0.65)",letterSpacing:0.2}}>{matched.length} {matched.length===1?"observation":"observations"}</span>
          {streak>=3&&<span style={{
            fontSize:11,letterSpacing:1.5,textTransform:"uppercase",
            color:"#A07548",fontWeight:600
          }}>Streak ×{streak}</span>}
          <span style={{
            fontFamily:"'Playfair Display',Georgia,serif",
            fontSize:20,fontWeight:500,color:"#1A2130",letterSpacing:0.3
          }}>{obs$}</span>
        </div>

        {/* Found observations */}
        {matched.length>0&&<div style={{marginBottom:18}}>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {matched.map((m,i)=>{
              const sp=SPEEDS.find(s=>s.key===m.category);
              return <div key={i} style={{
                display:"flex",alignItems:"center",gap:10,
                padding:"8px 12px",
                background:m.loose?"rgba(160, 117, 72, 0.06)":"#FFFFFF",
                border:"0.5px solid rgba(26, 33, 48, 0.08)",
                borderRadius:3,
                fontSize:13.5,
                color:m.loose?"rgba(26, 33, 48, 0.55)":"rgba(26, 33, 48, 0.85)"
              }}>
                <span style={{
                  display:"inline-block",width:6,height:6,borderRadius:"50%",
                  background:m.loose?"#A07548":sp.color,
                  flexShrink:0,opacity:m.loose?0.45:1
                }}/>
                <span style={{fontSize:11,letterSpacing:1.2,textTransform:"uppercase",color:"#6B4A2D",fontWeight:500,flexShrink:0,minWidth:62}}>{sp.label}</span>
                <span style={{flex:1,fontStyle:m.loose?"italic":"normal"}}>{m.text}</span>
                <span style={{
                  fontFamily:"'Playfair Display',Georgia,serif",
                  fontSize:14,fontWeight:500,
                  color:m.loose?"#A07548":"#1A2130",
                  flexShrink:0
                }}>+{m.pts}</span>
              </div>;
            })}
          </div>
        </div>}

        {/* Skip button */}
        <div style={{textAlign:"center",marginTop:24,paddingTop:16,borderTop:"0.5px solid rgba(26, 33, 48, 0.08)"}}>
          <button onClick={()=>{setPhase("locate");setTimer(30);}} style={{
            background:"transparent",
            color:"rgba(26, 33, 48, 0.55)",
            border:"none",
            fontSize:13,
            cursor:"pointer",
            fontFamily:"inherit",
            textDecoration:"underline",
            textDecorationColor:"rgba(26, 33, 48, 0.25)",
            textUnderlineOffset:3,
            letterSpacing:0.2
          }}>Skip to map →</button>
        </div>

      </div>
    </div>
  );

  // ——— LOCATE ———
  if(phase==="locate") return (
    <div style={{...S.pg,background:"#F1ECDE",color:"#1A2130"}}>
      <div style={S.bx}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:26,fontWeight:700,margin:0,color:"#1A2130",letterSpacing:0.5}}>Where in the world?</h1>
          <span style={{fontSize:26,fontWeight:800,fontFamily:"'Inter',monospace",color:timer<10?"#A0401F":"#A07548"}}>{fmt(timer)}</span>
        </div>
        <p style={{fontFamily:"'Inter',sans-serif",fontSize:15,color:"#6B4A2D",textAlign:"center",margin:"0 0 14px",letterSpacing:0.2}}>Click a country to drop your pin. Lean on your observations.</p>
        <WorldMap onClick={(lat,lng)=>setPin({lat,lng})} guess={pin}/>
        {pin&&<div style={{textAlign:"center",marginTop:16}}>
          <button onClick={submitLoc} style={{padding:"14px 36px",borderRadius:30,border:"none",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:17,letterSpacing:0.3,cursor:"pointer",background:"#A07548",color:"#F1ECDE",boxShadow:"0 2px 6px rgba(107,74,45,0.25)"}}>Lock in guess</button>
        </div>}
        {matched.length>0&&<div style={{marginTop:14,background:"#FFFFFF",border:"1px solid #D9CDB3",borderRadius:10,padding:14}}>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:13,fontWeight:600,color:"#6B4A2D",marginBottom:8,letterSpacing:0.4,textTransform:"uppercase"}}>Your evidence</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {matched.map((m,i)=>{const sp=SPEEDS.find(s=>s.key===m.category);return <span key={i} style={{display:"inline-block",padding:"5px 11px",borderRadius:16,background:sp.color+"15",color:sp.color,fontSize:13,fontWeight:600,fontFamily:"'Inter',sans-serif"}}>{sp.icon} {m.text.substring(0,50)}</span>;})}
          </div>
        </div>}
      </div>
    </div>
  );

  // ——— REVEAL ———
  if(phase==="reveal") return (
    <div style={{...S.pg,background:"#F1ECDE",color:"#1A2130"}}>
      <Toast msg={toast} show={toastOn} type={toastType}/>
      <div style={S.bx}>
        <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:30,fontWeight:700,textAlign:"center",color:"#1A2130",margin:"0 0 2px",letterSpacing:0.5}}>{loc.name}</h1>
        <p style={{fontFamily:"'Inter',sans-serif",textAlign:"center",fontSize:13,color:"#6B4A2D",margin:"0 0 14px",letterSpacing:0.8,textTransform:"uppercase",fontWeight:500}}>{loc.region}</p>
        <WorldMap onClick={()=>{}} guess={pin} actual={{lat:loc.coordinates?.lat ?? loc.lat,lng:loc.coordinates?.lng ?? loc.lng,name:loc.name}} showActual distanceKm={dist} revealMode/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",margin:"14px 0"}}>
          {[["Observations",obs$,"#2a9d8f"],["Coverage","+"+covBonus(),"#6a4c93"],["Location"+(dist?` (${dist}km)`:""),loc$,"#A07548"]].map(([l,v,c])=>
            <div key={l} style={{flex:1,textAlign:"center",minWidth:100,background:"#FFFFFF",border:"1px solid #D9CDB3",borderRadius:10,padding:"14px 10px"}}>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:12,color:"#6B4A2D",letterSpacing:0.4,textTransform:"uppercase",fontWeight:500}}>{l}</div>
              <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:26,fontWeight:700,color:c,marginTop:4}}>{v}</div>
            </div>
          )}
        </div>
        {/* All Observations Review — shown first */}
        <div style={{background:"#FFFFFF",border:"1px solid #D9CDB3",borderRadius:10,padding:20,marginBottom:14}}>
          <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:700,marginBottom:12,color:"#1A2130"}}>All observations <span style={{fontFamily:"'Inter',sans-serif",fontSize:14,fontWeight:500,color:"#6B4A2D"}}>({matched.length} of {allObs.length} found)</span></div>
          <div>
            {SPEEDS.map(sp=>{
              const co=loc.observations[sp.key]||{};
              const all=[...(co.tier1||[]).map(o=>({...o,text:o.display||o.text||"",t:1})),...(co.tier2||[]).map(o=>({...o,text:o.display||o.text||"",t:2}))];
              if(!all.length)return null;
              return <div key={sp.key} style={{marginBottom:12}}>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:13,fontWeight:600,color:sp.color,marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>{sp.icon} {sp.label}</div>
                {all.map((o,i)=>{
                  const hit=matched.some(m=>m.text===o.text);
                  const kw=Array.isArray(o.keywords)?o.keywords:[];
                  return <div key={i} style={{fontSize:15,padding:"8px 12px",marginBottom:4,borderRadius:6,background:hit?sp.color+"15":"#F3ECD9",color:hit?"#1A2130":"#6B4A2D",border:hit?`1px solid ${sp.color}30`:"1px solid #E6DDC4"}}>
                    <div style={{fontFamily:"'Inter',sans-serif"}}>
                      <span style={{fontWeight:600,marginRight:4,color:hit?sp.color:"#A07548"}}>{hit?"✓":"○"}</span>
                      {o.text}
                      <span style={{opacity:0.55,fontSize:12,marginLeft:6}}>T{o.t}</span>
                    </div>
                    {!hit && kw.length>0 && <div style={{fontFamily:"'Inter',sans-serif",fontSize:12,color:"#8F6A3F",marginTop:4,marginLeft:18,fontStyle:"italic",lineHeight:1.4}}>also accepted: {kw.join(", ")}</div>}
                  </div>;
                })}
              </div>;
            })}
          </div>
        </div>
        {/* Clue Highlights — shown after observations */}
        {loc.clueHighlights?.length>0&&<div style={{background:"#FFFFFF",border:"1px solid #D9CDB3",borderRadius:10,padding:20,marginBottom:14}}>
          <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:700,marginBottom:12,color:"#A07548"}}>Clue highlights</div>
          {loc.clueHighlights.map((c,i)=><div key={i} style={{marginBottom:10,fontSize:15,fontFamily:"'Inter',sans-serif",lineHeight:1.5}}>
            <span style={{color:"#2a9d8f",fontWeight:600}}>{c.clue||c.detail}</span>
            <span style={{color:"#6B4A2D"}}> &rsaquo; {c.category} &rsaquo; </span>
            <span style={{color:"#1A2130"}}>{c.inference}</span>
          </div>)}
        </div>}
        <div style={{textAlign:"center"}}><button onClick={()=>setPhase("frq")} style={{padding:"14px 36px",borderRadius:30,border:"none",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:17,letterSpacing:0.3,cursor:"pointer",background:"#A07548",color:"#F1ECDE",boxShadow:"0 2px 6px rgba(107,74,45,0.25)"}}>FRQ practice &rsaquo;</button></div>
      </div>
    </div>
  );

  // ——— FRQ ———
  if(phase==="frq") return (
    <div style={S.pg}>
      <Toast msg={toast} show={toastOn} type={toastType}/>
      <div style={S.bx}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h1 style={{...S.h1,fontSize:22,margin:0}}>FRQ Practice</h1>
          <span style={{...S.bg,background:"#457b9d33",color:"#457b9d",fontSize:17}}>Task Verb: {loc.frq?.verb}</span>
        </div>
        {/* Chunked Prompt */}
        <div style={S.cd}>
          <div style={{fontSize:20,lineHeight:1.7}}>
            {chunks.map((c,i)=><span key={i} style={{opacity:i<=chunk?1:0.25,transition:"opacity 0.4s"}}>{c} </span>)}
          </div>
          {chunk<chunks.length-1&&<button onClick={()=>setChunk(p=>p+1)} style={{...S.bt,...S.b2,marginTop:10,fontSize:16,padding:"8px 16px"}}>Read more →</button>}
        </div>
        {/* Observations as reference */}
        <div style={{...S.cd,background:"#f9f6f1",border:"1px solid #1e2e3e"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#555",marginBottom:6}}>📋 Your Observations (use as evidence)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {matched.length>0?matched.map((m,i)=>{const sp=SPEEDS.find(s=>s.key===m.category);return <span key={i} style={{...S.bg,background:sp.color+"12",color:sp.color,fontSize:16}}>{sp.icon} {m.text.substring(0,55)}</span>;}):
            <span style={{fontSize:15,color:"#888"}}>No observations this round</span>}
          </div>
        </div>
        {!frqDone&&<>
          <textarea value={frqTxt} onChange={e=>setFrqTxt(e.target.value)} rows={5} placeholder={`Write your ${(loc.frq?.verb||"").toLowerCase()} response... Reference evidence from the image.`}
            style={{...S.inp,resize:"vertical",fontFamily:"inherit",marginBottom:10}}/>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={scoreFRQ} disabled={!frqTxt.trim()} style={{...S.bt,...S.b1,opacity:frqTxt.trim()?1:0.4}}>Score My Response ✏️</button>
            <button onClick={()=>setPhase("limitation")} style={{...S.bt,...S.b2}}>Skip FRQ →</button>
          </div>
        </>}
        {frqDone&&frqFB&&<div style={S.cd}>
          <div style={{fontSize:19,fontWeight:700,color:"#e9c46a",marginBottom:12}}>ACE Check — {frqFB.pts} points</div>
          {[["content","A — Answer","Used geographic content from observations"],
            ["stimulus","C — Cite","Referenced the image/stimulus"],
            ["verb",`E — Expand (${frqFB.v})`,frqFB.v==="explain"?"Causal reasoning (because/leads to)":frqFB.v==="compare"?"Explicit comparison (while/whereas/both)":"Sufficient detail"]
          ].map(([k,label,desc])=><div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:22}}>{frqFB.ck[k]?"✅":"⬜"}</span>
            <span style={{fontSize:19}}><strong>{label}:</strong> {desc}</span>
          </div>)}
          <div style={{marginTop:14,padding:14,background:"#f0ece4",borderRadius:12,border:"1px solid #1e2e3e"}}>
            <div style={{fontSize:17,fontWeight:700,color:"#2a9d8f",marginBottom:6}}>Model Answer:</div>
            <div style={{fontSize:19,color:"#333",lineHeight:1.6}}>{loc.frq?.modelAnswer}</div>
          </div>
          {loc.frq?.speedsConnection&&<div style={{marginTop:8,fontSize:18,color:"#6a4c93",fontStyle:"italic"}}>{loc.frq.speedsConnection}</div>}
          <div style={{textAlign:"center",marginTop:14}}><button onClick={()=>setPhase("limitation")} style={{...S.bt,...S.b1}}>Limitation Question →</button></div>
        </div>}
      </div>
    </div>
  );

  // ——— LIMITATION ———
  if(phase==="limitation") return (
    <div style={S.pg}>
      <Toast msg={toast} show={toastOn} type={toastType}/>
      <div style={S.bx}>
        <h1 style={{...S.h1,fontSize:22,marginBottom:4}}>Data Limitations</h1>
        <p style={{textAlign:"center",fontSize:16,color:"#555",marginBottom:14}}>This trains AP FRQ Parts F–G: recognizing what a stimulus <em>cannot</em> tell you.</p>
        <div style={S.cd}><div style={{fontSize:20,lineHeight:1.6}}>{loc.limitation?.prompt}</div></div>
        {!limDone&&<>
          <input value={limTxt} onChange={e=>setLimTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&scoreLim()}
            placeholder="Type your answer here..." style={{...S.inp,marginBottom:10}}/>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={scoreLim} disabled={!limTxt.trim()} style={{...S.bt,...S.b1,opacity:limTxt.trim()?1:0.4}}>Check Answer</button>
            <button onClick={finish} style={{...S.bt,...S.b2}}>Skip →</button>
          </div>
        </>}
        {limDone&&<div style={S.cd}>
          <div style={{fontSize:19,fontWeight:700,color:limOk?"#2a9d8f":"#e9c46a",marginBottom:8}}>
            {limOk?"✅ Correct! +10 points":"Good thinking! Here are some examples:"}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {(loc.limitation?.acceptableResponses||[]).map((r,i)=><span key={i} style={{...S.bg,background:"#2a9d8f18",color:"#2a9d8f",fontSize:17}}>{r}</span>)}
          </div>
          <div style={{textAlign:"center",marginTop:14}}>
            <button onClick={finish} style={{...S.bt,...S.b1}}>{roundIdx+1<ROUNDS?"Next Round →":"View Results →"}</button>
          </div>
        </div>}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<SPEEDSExplorer />);
  </script>
</body>
</html>
