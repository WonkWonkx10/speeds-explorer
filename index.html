const expand = (word) => {
  const w = word.toLowerCase();
  const syn = SYNONYMS[w];
  return syn ? [w, syn] : [w];
};

  let extra = [];
  for (const [pattern, terms] of PHRASE_MAP) {
    if (pattern.test(input)) extra.push(...terms);
  }
  return extra;
};

  const R=6371, dr=Math.PI/180;
  const dLa=(la2-la1)*dr, dLo=(lo2-lo1)*dr;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*dr)*Math.cos(la2*dr)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

const locPts = d => d<150?5000:d<500?4000:d<1000?3000:d<2000?2000:d<4000?1000:d<8000?500:100;

const WorldMap = ({ onClick, guess, actual, showActual }) => {
  const svgRef = useRef(null);
  const [geoData, setGeoData] = useState(null);
  const [xform, setXform] = useState({k:1,x:0,y:0});
  const zoomBeh = useRef(null);
  const W = 580, H = 290;

  const proj = useMemo(() => {
    if (typeof d3 === "undefined") return null;
    return d3.geoNaturalEarth1().scale(88).translate([W/2, H/2]).precision(0.1);
  }, []);

  const pathGen = useMemo(() => {
    if (!proj) return null;
    return d3.geoPath().projection(proj);
  }, [proj]);

  useEffect(() => {
    if (!pathGen) return;
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
      .then(r => r.json())
      .then(world => {
        const land = topojson.feature(world, world.objects.land);
        const borders = topojson.mesh(world, world.objects.countries, (a,b) => a !== b);
        setGeoData({ landPath: pathGen(land), bordersPath: pathGen(borders) });
      })
      .catch(() => setGeoData({ error: true }));
  }, [pathGen]);

  useEffect(() => {
    if (!svgRef.current) return;
    const zoom = d3.zoom()
      .scaleExtent([1, 12])
      .filter(e => e.type === "mousedown" || e.type === "touchstart" || (e.type === "wheel" && e.ctrlKey))
      .on("zoom", e => setXform({k:e.transform.k, x:e.transform.x, y:e.transform.y}));
    d3.select(svgRef.current).call(zoom);
    zoomBeh.current = zoom;
  }, [svgRef.current]);

  const resetZoom = e => {
    e.stopPropagation();
    if (svgRef.current && zoomBeh.current)
      d3.select(svgRef.current).transition().duration(400).call(zoomBeh.current.transform, d3.zoomIdentity);
  };

  const zoomIn = e => {
    e.stopPropagation();
    if (svgRef.current && zoomBeh.current)
      d3.select(svgRef.current).transition().duration(250).call(zoomBeh.current.scaleBy, 1.6);
  };

  const zoomOut = e => {
    e.stopPropagation();
    if (svgRef.current && zoomBeh.current)
      d3.select(svgRef.current).transition().duration(250).call(zoomBeh.current.scaleBy, 0.625);
  };

  const handleClick = e => {
    if (!proj || !svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const svgX = ((e.clientX - rect.left) / rect.width * W - xform.x) / xform.k;
    const svgY = ((e.clientY - rect.top) / rect.height * H - xform.y) / xform.k;
    const coords = proj.invert([svgX, svgY]);
    if (coords && !isNaN(coords[0]) && !isNaN(coords[1])) onClick(coords[1], coords[0]);
  };

  const pin = (lat, lng) => {
    if (!proj) return null;
    const [x,y] = proj([lng, lat]);
    return { x: x*xform.k + xform.x, y: y*xform.k + xform.y };
  };

  const gPin = guess ? pin(guess.lat, guess.lng) : null;
  const aPin = (showActual && actual) ? pin(actual.lat, actual.lng) : null;

  const graticule = proj && pathGen ? pathGen(d3.geoGraticule()()) : null;
  const outline = proj && pathGen ? pathGen({type:"Sphere"}) : null;
  const equator = proj && pathGen ? pathGen({type:"LineString",coordinates:[[-180,0],[0,0],[180,0]]}) : null;
  const pr = 5/xform.k, fs = 8/xform.k, sw = 1.5/xform.k;

  return (
    <div style={{borderRadius:12,overflow:"hidden",border:"2px solid #c5b99a",background:"#b8d4e4",position:"relative"}}>
      <div style={{position:"absolute",top:8,right:8,zIndex:10,display:"flex",gap:4,alignItems:"center"}}>
        <button onClick={zoomIn} style={{background:"rgba(255,255,255,0.9)",border:"1px solid #c5b99a",borderRadius:6,width:30,height:30,fontSize:21,cursor:"pointer",fontWeight:700,color:"#5a4a2a",lineHeight:1}}>+</button>
        <button onClick={zoomOut} style={{background:"rgba(255,255,255,0.9)",border:"1px solid #c5b99a",borderRadius:6,width:30,height:30,fontSize:21,cursor:"pointer",fontWeight:700,color:"#5a4a2a",lineHeight:1}}>−</button>
        {xform.k > 1 && <button onClick={resetZoom} style={{background:"rgba(255,255,255,0.9)",border:"1px solid #c5b99a",borderRadius:6,padding:"3px 8px",fontSize:15,cursor:"pointer",fontWeight:600,color:"#5a4a2a"}}>⟳</button>}
      </div>
      <div style={{position:"absolute",bottom:8,left:8,zIndex:10,background:"rgba(255,255,255,0.7)",borderRadius:4,padding:"2px 6px",fontSize:14,color:"#5a4a2a",pointerEvents:"none"}}>
        {xform.k > 1 ? `${xform.k.toFixed(1)}× · drag to pan` : "+ / − to zoom · ctrl+scroll · drag to pan"}
      </div>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",cursor:xform.k>1?"move":"crosshair"}} onClick={handleClick}>
        <rect width={W} height={H} fill="#b8d4e4"/>
        <g transform={`translate(${xform.x},${xform.y}) scale(${xform.k})`}>
          {graticule && <path d={graticule} fill="none" stroke="#a0bcd0" strokeWidth={0.3/xform.k} opacity={0.5}/>}
          {geoData && !geoData.error && <path d={geoData.landPath} fill="#d4c9a0" stroke="none"/>}
          {geoData && !geoData.error && <path d={geoData.bordersPath} fill="none" stroke="#b0a070" strokeWidth={0.4/xform.k} opacity={0.8}/>}
          {outline && <path d={outline} fill="none" stroke="#7aaabf" strokeWidth={1/xform.k}/>}
          {equator && <path d={equator} fill="none" stroke="#c09060" strokeWidth={0.6/xform.k} strokeDasharray={`${4/xform.k},${3/xform.k}`} opacity={0.6}/>}
          {geoData && geoData.error && <text x={W/2} y={H/2} fill="#888" fontSize={12} textAnchor="middle">Map unavailable offline</text>}
          {!geoData && <text x={W/2} y={H/2} fill="#666" fontSize={12} textAnchor="middle">Loading map...</text>}
        </g>
        {gPin && <>
          <circle cx={gPin.x} cy={gPin.y} r={pr*1.5} fill="#e63946" stroke="#fff" strokeWidth={sw}/>
          <text x={gPin.x} y={gPin.y-(pr*1.5+3)} fill="#e63946" fontSize={fs} textAnchor="middle" fontWeight={700} stroke="#fff" strokeWidth={sw*0.5} paintOrder="stroke">Your Guess</text>
        </>}
        {aPin && <>
          {gPin && <line x1={gPin.x} y1={gPin.y} x2={aPin.x} y2={aPin.y} stroke="#f4a261" strokeWidth={sw} strokeDasharray={`${5/xform.k},${3/xform.k}`}/>}
          <circle cx={aPin.x} cy={aPin.y} r={pr*1.5} fill="#2a9d8f" stroke="#fff" strokeWidth={sw}/>
          <text x={aPin.x} y={aPin.y-(pr*1.5+3)} fill="#2a9d8f" fontSize={fs} textAnchor="middle" fontWeight={700} stroke="#fff" strokeWidth={sw*0.5} paintOrder="stroke">{actual.name}</text>
        </>}
      </svg>
    </div>
  );
};

const Toast = ({ msg, show, type }) => (
  <div style={{position:"fixed",top:20,left:"50%",transform:`translateX(-50%) translateY(${show?0:-120}px)`,
    background:"#fff",color:type==="wrong"?"#c0392b":"#2a9d8f",padding:"12px 24px 12px 12px",
    borderRadius:16,fontSize:22,fontWeight:700,zIndex:1000,transition:"transform 0.35s cubic-bezier(.4,0,.2,1)",
    boxShadow:"0 4px 16px rgba(0,0,0,0.15)",display:"flex",alignItems:"center",gap:10,
    border:type==="wrong"?"2px solid #e17055":"2px solid #2a9d8f"}}>
    <img src={type==="wrong" ? "wrong.png" : "correct.png"} style={{width:64,height:64,objectFit:"contain"}} alt=""/>
    {msg}
  </div>
);

function SPEEDSExplorer() {
  useEffect(()=>{
    const l=document.createElement('link');
    l.href='https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap';
    l.rel='stylesheet';document.head.appendChild(l);
  },[]);

  const [phase,setPhase]=useState("start");
  const [roundIdx,setRoundIdx]=useState(0);
  const [order,setOrder]=useState([]);
  const [timer,setTimer]=useState(180);
  const [cat,setCat]=useState(null);
  const [inp,setInp]=useState("");
  const [matched,setMatched]=useState([]);
  const [streak,setStreak]=useState(0);
  const [obs$,setObs$]=useState(0);
  const [pin,setPin]=useState(null);
  const [loc$,setLoc$]=useState(0);
  const [dist,setDist]=useState(null);
  const [hints,setHints]=useState(false);
  const [frqTxt,setFrqTxt]=useState("");
  const [frqDone,setFrqDone]=useState(false);
  const [frqFB,setFrqFB]=useState(null);
  const [limTxt,setLimTxt]=useState("");
  const [limDone,setLimDone]=useState(false);
  const [limOk,setLimOk]=useState(false);
  const [toast,setToast]=useState("");
  const [toastOn,setToastOn]=useState(false);
  const [toastType,setToastType]=useState("correct");
  const [scores,setScores]=useState([]);
  const [chunk,setChunk]=useState(0);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [dragging,setDragging]=useState(false);
  const [dragStart,setDragStart]=useState({x:0,y:0});
  const [showAllObs,setShowAllObs]=useState(false);
  const iRef=useRef(null);
  const subRef=useRef(null);

  // Only pick locations that have images
  const playable = useMemo(()=>LOCATIONS.map((l,i)=>({...l,idx:i})).filter(l=>l.playable),[]);
  const ROUNDS = Math.min(playable.length, 3);
  const loc = order.length>0 && order[roundIdx]!==undefined ? LOCATIONS[order[roundIdx]] : null;

  const flash = useCallback((m, type)=>{
    setToast(m||RHINO[Math.floor(Math.random()*RHINO.length)]);
    setToastType(type||"correct");
    setToastOn(true);
    setTimeout(()=>setToastOn(false),2500);
  },[]);

  const start = () => {
    const picks = playable.sort(()=>Math.random()-0.5).slice(0,ROUNDS).map(l=>l.idx);
    setOrder(picks);setRoundIdx(0);setScores([]);reset();setPhase("observe");
  };
  const reset = () => {
    setTimer(180);setCat(null);setInp("");setMatched([]);setStreak(0);setObs$(0);
    setPin(null);setLoc$(0);setDist(null);setHints(false);setFrqTxt("");setFrqDone(false);
    setFrqFB(null);setLimTxt("");setLimDone(false);setLimOk(false);setChunk(0);
    setZoom(1);setPan({x:0,y:0});setShowAllObs(false);
  };

  // Keep submit ref fresh
  useEffect(()=>{subRef.current=()=>{
    if(!loc)return;
    const d=pin?haversine(pin.lat,pin.lng,loc.lat,loc.lng):20000;
    setDist(Math.round(d));setLoc$(locPts(d));setPhase("reveal");
  };});

  useEffect(()=>{
    if(phase!=="observe")return;
    const t=setInterval(()=>setTimer(p=>{if(p<=1){setPhase("locate");setTimer(30);return 30;}return p-1;}),1000);
    return()=>clearInterval(t);
  },[phase]);

  useEffect(()=>{
    if(phase!=="locate")return;
    const t=setInterval(()=>setTimer(p=>{if(p<=1){subRef.current?.();return 0;}return p-1;}),1000);
    return()=>clearInterval(t);
  },[phase]);

  const allObs = useMemo(()=>{
    if(!loc)return [];
    const r=[];
    SPEEDS.forEach(s=>{
      const c=loc.observations[s.key]||{};
      (c.tier1||[]).forEach(o=>r.push({...o,category:s.key,tier:1}));
      (c.tier2||[]).forEach(o=>r.push({...o,category:s.key,tier:2}));
    });
    return r;
  },[loc]);

  const submitObs = () => {
    if(!inp.trim()||!loc)return;
    const found=allObs.find(o=>!matched.some(m=>m.text===o.text)&&fuzzy(inp,o.keywords));
    if(found){
      const s3=streak+1>=3;
      const pts=(found.tier===1?(s3?15:10):(s3?8:5))+(found.geoVocab?2:0);
      setMatched(p=>[...p,{...found,pts}]);setStreak(p=>p+1);setObs$(p=>p+pts);flash();
    } else { setStreak(0); flash("Keep looking! Try another angle 👀","wrong"); }
    setInp("");iRef.current?.focus();
  };

  const covBonus = () => {const c=new Set(matched.map(m=>m.category)).size;return c>=5?75:c>=4?50:c>=3?25:0;};

  const submitLoc = () => {
    if(!loc)return;
    const d=pin?haversine(pin.lat,pin.lng,loc.lat,loc.lng):20000;
    setDist(Math.round(d));setLoc$(locPts(d));setPhase("reveal");setTimer(0);
  };

  const scoreFRQ = () => {
    if(!loc||!frqTxt.trim())return;
    const v=(loc.frq?.verb||"").toLowerCase(), t=frqTxt.toLowerCase();
    let ck={stimulus:false,verb:false,content:false};
    ck.content=allObs.flatMap(o=>o.keywords.slice(0,3)).some(k=>t.includes(k.toLowerCase()));
    ck.stimulus=["image","photo","visible","shown","see","picture","shows","seen"].some(w=>t.includes(w));
    if(v==="explain") ck.verb=/because|due to|leads to|results in|causes|therefore|as a result|which means|since/.test(t);
    else if(v==="compare") ck.verb=/while|whereas|unlike|both|however|compared|in contrast|similar|different/.test(t);
    else if(v==="describe") ck.verb=t.split(/\s+/).length>=10;
    else ck.verb=true;
    const sc=Object.values(ck).filter(Boolean).length;
    const pts=sc>=3?15:sc>=2?10:sc>=1?5:0;
    setFrqFB({ck,sc,pts,v});setObs$(p=>p+pts);setFrqDone(true);
    if(pts>=10)flash("Strong FRQ response! 🦏");
  };

  const scoreLim = () => {
    if(!loc||!limTxt.trim())return;
    const ok=(loc.limitation?.acceptableResponses||[]).some(r=>
      limTxt.toLowerCase().includes(r.toLowerCase())||fuzzy(limTxt,[r]));
    setLimOk(ok);setLimDone(true);
    if(ok){setObs$(p=>p+10);flash("Limitation identified! 🦏");}
  };

  const finish = () => {
    const cb=covBonus(), tot=obs$+cb+loc$;
    setScores(p=>[...p,{obs:obs$,cov:cb,loc:loc$,total:tot,name:loc.name}]);
    if(roundIdx+1<ROUNDS){setRoundIdx(p=>p+1);reset();setPhase("observe");}
    else setPhase("summary");
  };

  const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
  const grand = scores.reduce((a,b)=>a+b.total,0);

  const chunks = useMemo(()=>{
    if(!loc?.frq?.prompt)return [];
    const w=loc.frq.prompt.split(" ");const c=[];
    for(let i=0;i<w.length;i+=8)c.push(w.slice(i,i+8).join(" "));
    return c;
  },[loc]);

  const S={
    pg:{fontFamily:"'Crimson Pro',Georgia,serif",minHeight:"100vh",background:"#f5f0e8",color:"#1a1a2e",position:"relative",overflowX:"hidden"},
    bx:{maxWidth:880,margin:"0 auto",padding:"20px 16px"},
    h1:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:32,fontWeight:800,textAlign:"center",letterSpacing:1,color:"#1a1a2e"},
    cd:{background:"#fff",borderRadius:16,padding:24,marginBottom:14,border:"1px solid #d4cfc4",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"},
    bt:{padding:"16px 32px",borderRadius:30,border:"none",fontWeight:700,fontSize:22,cursor:"pointer",transition:"all 0.2s"},
    b1:{background:"linear-gradient(135deg,#2a9d8f,#21867a)",color:"#fff"},
    b2:{background:"#e8e2d8",color:"#1a1a2e",border:"1px solid #ccc5b8"},
    pill:{padding:"10px 16px",borderRadius:20,border:"2px solid transparent",cursor:"pointer",fontSize:18,fontWeight:700,transition:"all 0.15s",display:"inline-flex",alignItems:"center",gap:5},
    inp:{width:"100%",padding:"16px 18px",borderRadius:12,border:"2px solid #ccc5b8",background:"#fff",color:"#1a1a2e",fontSize:21,outline:"none",boxSizing:"border-box"},
    bg:{display:"inline-block",padding:"5px 12px",borderRadius:20,fontSize:17,fontWeight:700},
  };

  // ——— START ———
  if(phase==="start") return (
    <div style={S.pg}>
      <div style={{...S.bx,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"90vh"}}>
        <div style={{fontSize:72,marginBottom:8}}>🦏</div>
        <h1 style={{...S.h1,fontSize:44,marginBottom:4}}>S.P.E.E.D.S. Explorer</h1>
        <p style={{textAlign:"center",fontSize:18,color:"#666",marginBottom:24,maxWidth:480}}>Train your geographic observation skills for the AP Human Geography exam. Analyze real-world locations using the SPEEDS framework.</p>
        <div style={{...S.cd,maxWidth:460,textAlign:"center"}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:20}}>
            {SPEEDS.map(sp=><span key={sp.key} style={{...S.bg,background:sp.color+"18",color:sp.color,border:`1px solid ${sp.color}33`}}>{sp.icon} {sp.label}</span>)}
          </div>
          <p style={{fontSize:17,color:"#555",marginBottom:20}}>{ROUNDS} rounds • 3 min observe • Map guess • FRQ + Limitation</p>
          <button style={{...S.bt,...S.b1,fontSize:21,padding:"16px 48px"}} onClick={start}>Start Exploring 🌍</button>
        </div>
      </div>
    </div>
  );

  // ——— SUMMARY ———
  if(phase==="summary") return (
    <div style={S.pg}>
      <div style={S.bx}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:56}}>🦏</div>
          <h1 style={S.h1}>Expedition Complete!</h1>
        </div>
        {scores.map((r,i)=>(
          <div key={i} style={{...S.cd,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:19}}>{r.name}</div>
              <div style={{fontSize:16,color:"#666"}}>Observations: {r.obs} + Coverage: {r.cov} + Location: {r.loc}</div>
            </div>
            <div style={{fontSize:26,fontWeight:900,color:"#2a9d8f"}}>{r.total}</div>
          </div>
        ))}
        <div style={{...S.cd,textAlign:"center"}}>
          <div style={{fontSize:52,fontWeight:900,color:"#e9c46a"}}>{grand}</div>
          <div style={{fontSize:17,color:"#666"}}>Total Score</div>
        </div>
        <div style={{textAlign:"center",marginTop:8}}>
          <button style={{...S.bt,...S.b1}} onClick={()=>{setPhase("start");setRoundIdx(0);setScores([]);}}>Play Again</button>
        </div>
      </div>
    </div>
  );

  if(!loc)return null;

  // ——— IMAGE VIEWER ———
  const [imgLoaded, setImgLoaded] = useState(false);
  useEffect(()=>{setImgLoaded(false);setZoom(1);setPan({x:0,y:0});},[roundIdx]);
  const handleTouchStart = (e)=>{if(zoom>1&&e.touches.length===1){setDragging(true);setDragStart({x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y});}};
  const handleTouchMove = (e)=>{if(dragging&&e.touches.length===1){e.preventDefault();setPan({x:e.touches[0].clientX-dragStart.x,y:e.touches[0].clientY-dragStart.y});}};
  const handleTouchEnd = ()=>setDragging(false);
  const Img = () => {
    const src = loc.image || null;
    if(!src) return <div style={{background:"linear-gradient(135deg,#e0dbd2,#d4cfc4)",borderRadius:12,height:240,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid #ccc5b8"}}><span style={{color:"#888",fontSize:19}}>Image not available</span></div>;
    const zBtn = {background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",borderRadius:8,width:36,height:36,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700};
    return (
      <div style={{borderRadius:12,overflow:"hidden",border:"2px solid #2a3a4a",position:"relative",cursor:zoom>1?"grab":"zoom-in",background:"#1a1a2e"}}
        onWheel={e=>{e.preventDefault();setZoom(z=>Math.max(1,Math.min(5,z+(e.deltaY<0?0.3:-0.3))));}}
        onMouseDown={e=>{if(zoom>1){setDragging(true);setDragStart({x:e.clientX-pan.x,y:e.clientY-pan.y});}}}
        onMouseMove={e=>{if(dragging)setPan({x:e.clientX-dragStart.x,y:e.clientY-dragStart.y});}}
        onMouseUp={()=>setDragging(false)}
        onMouseLeave={()=>setDragging(false)}
        onDoubleClick={()=>{if(zoom>1){setZoom(1);setPan({x:0,y:0});}else setZoom(2.5);}}
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={handleTouchEnd}
      >
        {!imgLoaded&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:300,color:"#aaa",fontSize:18}}>📷 Loading image...</div>}
        <img src={src} alt="Mystery location" onLoad={()=>setImgLoaded(true)} style={{width:"100%",height:"auto",display:imgLoaded?"block":"none",objectFit:"contain",transform:`scale(${zoom}) translate(${pan.x/zoom}px,${pan.y/zoom}px)`,transition:dragging?"none":"transform 0.2s",transformOrigin:"center"}} draggable={false}/>
        <div style={{position:"absolute",bottom:8,right:8,display:"flex",gap:6,zIndex:10}}>
          <button onClick={e=>{e.stopPropagation();setZoom(z=>Math.min(5,z+0.5));}} style={zBtn}>+</button>
          <button onClick={e=>{e.stopPropagation();setZoom(1);setPan({x:0,y:0});}} style={{...zBtn,fontSize:16}}>⟲</button>
          <button onClick={e=>{e.stopPropagation();setZoom(z=>Math.max(1,z-0.5));}} style={zBtn}>−</button>
        </div>
      </div>
    );
  };

  // ——— OBSERVE ———
  if(phase==="observe") return (
    <div style={S.pg}>
      <Toast msg={toast} show={toastOn} type={toastType}/>
      <div style={S.bx}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <h1 style={{...S.h1,fontSize:21,margin:0}}>S.P.E.E.D.S. Explorer</h1>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16,color:"#555"}}>Round {roundIdx+1}/{ROUNDS}</span>
            <span style={{fontSize:24,fontWeight:900,fontFamily:"monospace",color:timer<30?"#e63946":"#2a9d8f"}}>{fmt(timer)}</span>
          </div>
        </div>
        <Img/>
        {/* SPEEDS Pills + Hints in one row */}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"8px 0 6px",justifyContent:"center",alignItems:"center"}}>
          {SPEEDS.map(sp=>{
            const n=matched.filter(m=>m.category===sp.key).length;
            const on=cat===sp.key;
            return <button key={sp.key} onClick={()=>setCat(on?null:sp.key)} style={{...S.pill,background:on?sp.color:sp.color+"12",color:on?"#fff":sp.color,borderColor:on?sp.color:"transparent"}}>
              {sp.icon} {sp.label} {n>0&&<span style={{...S.bg,background:"rgba(0,0,0,0.1)",fontSize:14,padding:"2px 6px"}}>{n}</span>}
            </button>;
          })}
          <button onClick={()=>setHints(!hints)} style={{...S.pill,background:hints?"#e9c46a":"#e9c46a18",color:hints?"#fff":"#b8960a",borderColor:hints?"#e9c46a":"transparent"}}>
            💡 Hints
          </button>
        </div>
        {hints&&<div style={{background:"#f9f6f1",fontSize:18,color:"#444",padding:"8px 14px",textAlign:"center",marginBottom:6,borderRadius:10,border:"1px solid #e8e2d8"}}>
          {cat?HINTS[cat]:"Tap a category above to see hints."}
        </div>}
        {/* Input */}
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          <input ref={iRef} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitObs()}
            placeholder={cat?`Type a ${cat} observation...`:"Type any observation..."} style={S.inp}/>
          <button onClick={submitObs} style={{...S.bt,...S.b1,whiteSpace:"nowrap"}}>Submit</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <span style={{fontSize:16,color:"#555"}}>{matched.length} found</span>
          {streak>=3&&<span style={{...S.bg,background:"#e9c46a25",color:"#e9c46a"}}>🔥 {streak} streak!</span>}
          <span style={{fontSize:19,fontWeight:900,color:"#b8960a"}}>Score: {obs$}</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
          {matched.map((m,i)=>{const sp=SPEEDS.find(s=>s.key===m.category);return <span key={i} style={{...S.bg,background:sp.color+"18",color:sp.color,fontSize:14,maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sp.icon} {m.text.substring(0,45)}… +{m.pts}</span>;})}
        </div>
        <div style={{textAlign:"center"}}><button onClick={()=>{setPhase("locate");setTimer(30);}} style={{...S.bt,...S.b2,fontSize:16,padding:"8px 20px"}}>Skip to Map →</button></div>
      </div>
    </div>
  );

  // ——— LOCATE ———
  if(phase==="locate") return (
    <div style={S.pg}>
      <div style={S.bx}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h1 style={{...S.h1,fontSize:22,margin:0}}>Where in the world?</h1>
          <span style={{fontSize:28,fontWeight:900,fontFamily:"monospace",color:timer<10?"#e63946":"#e9c46a"}}>{fmt(timer)}</span>
        </div>
        <p style={{fontSize:17,color:"#555",textAlign:"center",margin:"0 0 10px"}}>Click the map to drop your pin. Use your observations as evidence.</p>
        <WorldMap onClick={(lat,lng)=>setPin({lat,lng})} guess={pin}/>
        {pin&&<div style={{textAlign:"center",marginTop:14}}>
          <button onClick={submitLoc} style={{...S.bt,...S.b1,fontSize:19,padding:"14px 40px"}}>Lock In Guess 📍</button>
        </div>}
        {matched.length>0&&<div style={{...S.cd,marginTop:12}}>
          <div style={{fontSize:16,fontWeight:700,color:"#555",marginBottom:6}}>Your Evidence:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {matched.map((m,i)=>{const sp=SPEEDS.find(s=>s.key===m.category);return <span key={i} style={{...S.bg,background:sp.color+"12",color:sp.color,fontSize:14}}>{sp.icon} {m.text.substring(0,50)}</span>;})}
          </div>
        </div>}
      </div>
    </div>
  );

  // ——— REVEAL ———
  if(phase==="reveal") return (
    <div style={S.pg}>
      <Toast msg={toast} show={toastOn} type={toastType}/>
      <div style={S.bx}>
        <h1 style={{...S.h1,marginBottom:4}}>📍 {loc.name}</h1>
        <p style={{textAlign:"center",fontSize:16,color:"#555",marginBottom:14}}>{loc.region}</p>
        <WorldMap onClick={()=>{}} guess={pin} actual={{lat:loc.lat,lng:loc.lng,name:loc.name}} showActual/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",margin:"14px 0"}}>
          {[["Observations",obs$,"#2a9d8f"],["Coverage","+"+covBonus(),"#6a4c93"],["Location"+(dist?` (${dist}km)`:""),loc$,"#e9c46a"]].map(([l,v,c])=>
            <div key={l} style={{...S.cd,flex:1,textAlign:"center",minWidth:100}}>
              <div style={{fontSize:16,color:"#555"}}>{l}</div>
              <div style={{fontSize:24,fontWeight:900,color:c}}>{v}</div>
            </div>
          )}
        </div>
        {/* All Observations Review — shown first */}
        <div style={S.cd}>
          <div style={{fontSize:19,fontWeight:700,marginBottom:10,color:"#555"}}>📝 All Observations ({matched.length}/{allObs.length} found)</div>
          <div>
            {SPEEDS.map(sp=>{
              const co=loc.observations[sp.key]||{};
              const all=[...(co.tier1||[]).map(o=>({...o,t:1})),...(co.tier2||[]).map(o=>({...o,t:2}))];
              if(!all.length)return null;
              return <div key={sp.key} style={{marginBottom:10}}>
                <div style={{fontSize:18,fontWeight:700,color:sp.color,marginBottom:4}}>{sp.icon} {sp.label}</div>
                {all.map((o,i)=>{const hit=matched.some(m=>m.text===o.text);return <div key={i} style={{fontSize:18,padding:"6px 12px",marginBottom:3,borderRadius:6,background:hit?sp.color+"18":"#e8e2d8",color:hit?sp.color:"#888"}}>{hit?"✓":"○"} {o.text} <span style={{opacity:0.5,fontSize:15}}>(T{o.t})</span></div>;})}
              </div>;
            })}
          </div>
        </div>
        {/* Clue Highlights — shown after observations */}
        {loc.clueHighlights?.length>0&&<div style={S.cd}>
          <div style={{fontSize:19,fontWeight:700,marginBottom:10,color:"#e9c46a"}}>🔎 Clue Highlights</div>
          {loc.clueHighlights.map((c,i)=><div key={i} style={{marginBottom:10,fontSize:19}}>
            <span style={{color:"#2a9d8f",fontWeight:700}}>{c.detail}</span>
            <span style={{color:"#555"}}> → {c.category} → </span>
            <span>{c.inference}</span>
          </div>)}
        </div>}
        <div style={{textAlign:"center"}}><button onClick={()=>setPhase("frq")} style={{...S.bt,...S.b1}}>FRQ Practice →</button></div>
      </div>
    </div>
  );

  // ——— FRQ ———
  if(phase==="frq") return (
    <div style={S.pg}>
      <Toast msg={toast} show={toastOn} type={toastType}/>
      <div style={S.bx}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h1 style={{...S.h1,fontSize:22,margin:0}}>FRQ Practice</h1>
          <span style={{...S.bg,background:"#457b9d33",color:"#457b9d",fontSize:17}}>Task Verb: {loc.frq?.verb}</span>
        </div>
        {/* Chunked Prompt */}
        <div style={S.cd}>
          <div style={{fontSize:20,lineHeight:1.7}}>
            {chunks.map((c,i)=><span key={i} style={{opacity:i<=chunk?1:0.25,transition:"opacity 0.4s"}}>{c} </span>)}
          </div>
          {chunk<chunks.length-1&&<button onClick={()=>setChunk(p=>p+1)} style={{...S.bt,...S.b2,marginTop:10,fontSize:16,padding:"8px 16px"}}>Read more →</button>}
        </div>
        {/* Observations as reference */}
        <div style={{...S.cd,background:"#f9f6f1",border:"1px solid #1e2e3e"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#555",marginBottom:6}}>📋 Your Observations (use as evidence)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {matched.length>0?matched.map((m,i)=>{const sp=SPEEDS.find(s=>s.key===m.category);return <span key={i} style={{...S.bg,background:sp.color+"12",color:sp.color,fontSize:16}}>{sp.icon} {m.text.substring(0,55)}</span>;}):
            <span style={{fontSize:15,color:"#888"}}>No observations this round</span>}
          </div>
        </div>
        {!frqDone&&<>
          <textarea value={frqTxt} onChange={e=>setFrqTxt(e.target.value)} rows={5} placeholder={`Write your ${(loc.frq?.verb||"").toLowerCase()} response... Reference evidence from the image.`}
            style={{...S.inp,resize:"vertical",fontFamily:"inherit",marginBottom:10}}/>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={scoreFRQ} disabled={!frqTxt.trim()} style={{...S.bt,...S.b1,opacity:frqTxt.trim()?1:0.4}}>Score My Response ✏️</button>
            <button onClick={()=>setPhase("limitation")} style={{...S.bt,...S.b2}}>Skip FRQ →</button>
          </div>
        </>}
        {frqDone&&frqFB&&<div style={S.cd}>
          <div style={{fontSize:19,fontWeight:700,color:"#e9c46a",marginBottom:12}}>ACE Check — {frqFB.pts} points</div>
          {[["content","A — Answer","Used geographic content from observations"],
            ["stimulus","C — Cite","Referenced the image/stimulus"],
            ["verb",`E — Expand (${frqFB.v})`,frqFB.v==="explain"?"Causal reasoning (because/leads to)":frqFB.v==="compare"?"Explicit comparison (while/whereas/both)":"Sufficient detail"]
          ].map(([k,label,desc])=><div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:22}}>{frqFB.ck[k]?"✅":"⬜"}</span>
            <span style={{fontSize:19}}><strong>{label}:</strong> {desc}</span>
          </div>)}
          <div style={{marginTop:14,padding:14,background:"#f0ece4",borderRadius:12,border:"1px solid #1e2e3e"}}>
            <div style={{fontSize:17,fontWeight:700,color:"#2a9d8f",marginBottom:6}}>Model Answer:</div>
            <div style={{fontSize:19,color:"#333",lineHeight:1.6}}>{loc.frq?.modelAnswer}</div>
          </div>
          {loc.frq?.speedsConnection&&<div style={{marginTop:8,fontSize:18,color:"#6a4c93",fontStyle:"italic"}}>{loc.frq.speedsConnection}</div>}
          <div style={{textAlign:"center",marginTop:14}}><button onClick={()=>setPhase("limitation")} style={{...S.bt,...S.b1}}>Limitation Question →</button></div>
        </div>}
      </div>
    </div>
  );

  // ——— LIMITATION ———
  if(phase==="limitation") return (
    <div style={S.pg}>
      <Toast msg={toast} show={toastOn} type={toastType}/>
      <div style={S.bx}>
        <h1 style={{...S.h1,fontSize:22,marginBottom:4}}>Data Limitations</h1>
        <p style={{textAlign:"center",fontSize:16,color:"#555",marginBottom:14}}>This trains AP FRQ Parts F–G: recognizing what a stimulus <em>cannot</em> tell you.</p>
        <div style={S.cd}><div style={{fontSize:20,lineHeight:1.6}}>{loc.limitation?.prompt}</div></div>
        {!limDone&&<>
          <input value={limTxt} onChange={e=>setLimTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&scoreLim()}
            placeholder="Type your answer here..." style={{...S.inp,marginBottom:10}}/>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={scoreLim} disabled={!limTxt.trim()} style={{...S.bt,...S.b1,opacity:limTxt.trim()?1:0.4}}>Check Answer</button>
            <button onClick={finish} style={{...S.bt,...S.b2}}>Skip →</button>
          </div>
        </>}
        {limDone&&<div style={S.cd}>
          <div style={{fontSize:19,fontWeight:700,color:limOk?"#2a9d8f":"#e9c46a",marginBottom:8}}>
            {limOk?"✅ Correct! +10 points":"Good thinking! Here are some examples:"}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {(loc.limitation?.acceptableResponses||[]).map((r,i)=><span key={i} style={{...S.bg,background:"#2a9d8f18",color:"#2a9d8f",fontSize:17}}>{r}</span>)}
          </div>
          <div style={{textAlign:"center",marginTop:14}}>
            <button onClick={finish} style={{...S.bt,...S.b1}}>{roundIdx+1<ROUNDS?"Next Round →":"View Results →"}</button>
          </div>
        </div>}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<SPEEDSExplorer />);
  </script>
</body>
</html>
